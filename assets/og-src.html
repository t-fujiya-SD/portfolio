<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@600;700&family=Noto+Sans+JP:wght@700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:1200px;height:630px;overflow:hidden}
body{font-family:"Noto Sans JP",sans-serif;background:#fff;position:relative;display:flex;flex-direction:column;justify-content:space-between;padding:64px 72px 0}
body::before{content:"";position:absolute;right:-160px;top:-220px;width:640px;height:640px;background:radial-gradient(circle,#fbeeec,transparent 66%)}
body::after{content:"";position:absolute;left:0;right:0;bottom:0;height:14px;background:linear-gradient(90deg,#C32F1C,#e85a3a)}
.logo{height:40px;width:auto;position:relative}
h1{position:relative;font-size:62px;line-height:1.42;font-weight:900;letter-spacing:-.02em;color:#2f3133}
h1 .hl{color:#C32F1C;position:relative}
h1 .hl::after{content:"";position:absolute;left:0;right:0;bottom:6px;height:16px;background:#fbeeec;z-index:-1}
.sub{position:relative;font-size:26px;font-weight:700;color:#5b6066;margin-top:26px}
.foot{position:relative;display:flex;justify-content:space-between;align-items:center;padding:0 0 44px}
.url{font-family:"Chakra Petch",sans-serif;font-size:22px;font-weight:600;color:#8a9099;letter-spacing:.02em}
.badge{font-size:21px;font-weight:700;color:#C32F1C;background:#fbeeec;border:2px solid #eccfc9;border-radius:40px;padding:12px 28px}
</style>
</head>
<body>
  <img class="logo" src="logo.png" alt="SPICY DEVICE">
  <div>
    <h1>飲食店専用の<span class="hl">Webツール</span>で、<br>現場の「めんどう」をなくす。</h1>
    <div class="sub">飲食店専門のWebツール制作 ／ 1機能から、あなたの店に合わせて</div>
  </div>
  <div class="foot">
    <span class="url">spicy-device.com</span>
    <span class="badge">🖥 実際に動くデモ公開中</span>
  </div>
</body>
</html>
