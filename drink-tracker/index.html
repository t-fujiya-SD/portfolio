<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ドリンク売上トラッカー｜デモ</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f4f0;--surface:#fff;--surface2:#f0efe9;--surface3:#e8e6de;
  --border:rgba(0,0,0,0.09);--border2:rgba(0,0,0,0.16);
  --text:#1a1917;--text2:#6b6960;--text3:#9e9d96;
  --blue:#3b6bde;--green:#2a9e55;--amber:#d97706;--red:#dc2626;
  --r:8px;--r-lg:14px;
}
body{font-family:'Hiragino Sans','Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;min-height:100vh}
#root{max-width:760px;margin:0 auto;padding:20px 14px 80px}
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r-lg);padding:16px 20px;margin-bottom:10px}
.card-sm{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);padding:12px 14px}
.lbl{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);display:block;margin-bottom:4px}
input,select{width:100%;padding:8px 10px;border:0.5px solid var(--border2);border-radius:var(--r);font-size:13px;font-family:inherit;background:var(--surface);color:var(--text);outline:none}
input:focus,select:focus{border-color:var(--text)}
button{padding:8px 14px;border:0.5px solid var(--border2);border-radius:var(--r);font-size:13px;font-family:inherit;background:var(--surface);color:var(--text);cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:background .1s}
button:hover{background:var(--surface2)}
button:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:var(--text);color:#fff;border-color:var(--text);width:100%;justify-content:center;padding:11px;font-size:14px;font-weight:600;border-radius:var(--r-lg)}
.btn-primary:hover{background:#333}
.btn-primary:disabled{background:var(--text3);border-color:var(--text3)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.row{display:flex;align-items:center;gap:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin 1s linear infinite;display:inline-block}
.upload-zone{border:1.5px dashed var(--border2);border-radius:var(--r-lg);padding:24px;text-align:center;cursor:pointer;background:var(--surface2)}
.upload-zone:hover{border-color:var(--blue);background:#eff3ff}
.metric-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);padding:14px;text-align:center}
.metric-val{font-size:16px;font-weight:700;letter-spacing:-0.02em;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.metric-lbl{font-size:10px;color:var(--text2)}
.nav-tabs{display:flex;gap:3px;background:#ece9e0;border-radius:12px;padding:3px;margin-bottom:16px}
.nav-tab{flex:1;border:none;border-radius:9px;padding:8px 4px;font-size:12px;font-weight:400;background:transparent;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;font-family:inherit}
.nav-tab.active{background:#fff;color:var(--text);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.api-bar{background:#fffbeb;border:0.5px solid #fcd34d;border-radius:var(--r-lg);padding:12px 16px;margin-bottom:12px}
.receipt-img{width:100%;border-radius:var(--r);border:0.5px solid var(--border);max-height:200px;object-fit:contain;background:#f9f9f7;display:block;margin-bottom:10px}
.seg-ctrl{display:flex;background:var(--surface2);border-radius:var(--r);padding:2px;gap:2px}
.seg-btn{flex:1;border:none;border-radius:6px;padding:5px 6px;font-size:11px;font-weight:400;background:transparent;color:var(--text2);cursor:pointer;font-family:inherit}
.seg-btn.active{background:#fff;color:var(--text);font-weight:600;box-shadow:0 1px 2px rgba(0,0,0,.07)}
.scroll-x{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:6px 8px;color:var(--text3);font-weight:500;border-bottom:0.5px solid var(--border2);white-space:nowrap}
td{padding:8px 8px;border-bottom:0.5px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
.empty{text-align:center;padding:32px 16px;color:var(--text2)}
.empty i{font-size:32px;display:block;margin-bottom:8px;color:var(--text3)}
/* SVG Chart */
.chart-wrap{position:relative;width:100%;overflow:hidden}
.bar-tooltip{position:absolute;background:rgba(26,25,23,.85);color:#fff;font-size:11px;padding:4px 8px;border-radius:5px;pointer-events:none;white-space:nowrap;transform:translateX(-50%);z-index:10}
/* Goal */
.goal-bar{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);margin-bottom:12px;font-size:13px}
.goal-bar input{width:88px;padding:3px 6px;border:0.5px solid var(--border2);border-radius:6px;font-size:13px;text-align:right}
.achievement-banner{padding:14px;border-radius:var(--r);border:0.5px solid;margin-bottom:12px}
.achievement-progress{height:8px;border-radius:4px;background:var(--border);margin:6px 0;overflow:hidden}
.achievement-progress-fill{height:100%;border-radius:4px;transition:width .3s}
.metric-sub{font-size:10px;margin-top:3px}
</style>
</head>
<body>
<div id="root"></div>
<script>
const {useState,useEffect,useRef,useMemo}=React;
const MODEL='claude-opus-4-5';
const SKEY='drink_tracker_v2';
const KEYKEY='drink_tracker_key';
const DAYS=['日','月','火','水','木','金','土'];

/* ===== デモ版: サンプルデータ自動投入 ===== */
function demoRng(seed){let a=seed>>>0;return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function buildDemoData(){
  const rnd=demoRng(20240609);
  const pad=n=>String(n).padStart(2,'0');
  const fmt=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  const DRINK_MENU=[
    {name:'生ビール',price:650},{name:'プレミアム生ビール',price:780},{name:'角ハイボール',price:550},
    {name:'レモンサワー',price:520},{name:'ハイボール',price:580},{name:'梅酒ソーダ',price:580},
    {name:'白ワイングラス',price:680},{name:'赤ワイングラス',price:680},{name:'スパークリングワイングラス',price:780},
    {name:'日本酒 純米',price:780},{name:'芋焼酎ロック',price:620},{name:'ジントニック',price:680},
    {name:'カシスオレンジ',price:620},{name:'ウーロン茶',price:380},{name:'ジンジャーエール',price:420},
    {name:'ノンアルコールビール',price:550}
  ];
  const SEATS=['テーブル：T1','テーブル：T2','テーブル：T3','テーブル：T4','テーブル：T5','カウンター：C1','カウンター：C2','個室：座敷1','個室：座敷2'];
  const COURSES=['ディナーコース','アラカルト','宴会コース','飲み放題付きコース'];
  const today=new Date();
  const days=[];
  /* 直近35日分の日次レコード（昨日まで） */
  for(let i=35;i>=1;i--){
    const d=new Date(today.getFullYear(),today.getMonth(),today.getDate()-i);
    const dow=d.getDay();
    const weekend=(dow===5||dow===6);
    const slow=(dow===1||dow===2);
    let covers=Math.round((weekend?78:slow?42:58)+(rnd()*18-9));
    if(covers<20)covers=20;
    const drinkPerCoverTarget=Math.round((weekend?1380:1180)+(rnd()*260-130));
    const drinkSales=covers*drinkPerCoverTarget;
    const drinkRatio=0.24+rnd()*0.07;
    const totalSales=Math.round(drinkSales/drinkRatio);
    const foodSales=totalSales-drinkSales;
    const tableCount=Math.max(6,Math.round(covers/2.6));
    days.push({date:fmt(d),totalSales,totalCovers:covers,drinkSales,foodSales,tableCount,
      drinkPerCover:Math.round(drinkSales/covers),drinkRatio:drinkSales/totalSales,
      closedAt:new Date(d.getFullYear(),d.getMonth(),d.getDate(),23,15).toISOString(),notes:''});
  }
  /* 本日のテーブルレコード（今日タブ用） */
  const tables=[];
  const todayStr=fmt(today);
  for(let i=0;i<6;i++){
    const covers=2+Math.floor(rnd()*5);
    /* 1人あたりドリンク単価が現実的（約950〜1600円）になるよう品目を積み上げる */
    const targetPC=950+Math.floor(rnd()*650);
    const drinkTotalTarget=covers*targetPC;
    const drinks=[];const used={};let acc=0;
    while(acc<drinkTotalTarget*0.85&&drinks.length<6){
      const m=DRINK_MENU[Math.floor(rnd()*DRINK_MENU.length)];
      const remaining=Math.max(m.price,drinkTotalTarget-acc);
      const qty=Math.max(1,Math.min(Math.round(remaining/m.price),1+Math.floor(rnd()*3)));
      if(used[m.name]){used[m.name].qty+=qty;used[m.name].subtotal+=m.price*qty;}
      else{const o={name:m.name,qty,unitPrice:m.price,subtotal:m.price*qty};used[m.name]=o;drinks.push(o);}
      acc+=m.price*qty;
    }
    const drinkTotal=drinks.reduce((s,x)=>s+x.subtotal,0);
    const foodTotal=covers*(2200+Math.floor(rnd()*1600));
    const total=drinkTotal+foodTotal;
    const hh=17+Math.floor(rnd()*5);const mm=Math.floor(rnd()*60);
    tables.push({id:'demo-'+i,date:todayStr,time:`${pad(hh)}:${pad(mm)}`,
      seat:SEATS[i%SEATS.length],covers,course:COURSES[Math.floor(rnd()*COURSES.length)],
      drinks,drinkTotal,foodTotal,total,
      drinkPerCover:Math.round(drinkTotal/covers),
      drinksPerCover:drinks.reduce((s,x)=>s+x.qty,0)/covers,
      savedAt:new Date().toISOString()});
  }
  /* 具体施策（今日・昨日） */
  const yest=fmt(new Date(today.getFullYear(),today.getMonth(),today.getDate()-1));
  const measures={};
  measures[todayStr]=[
    {id:'m1',category:'ディナードリンク杯数',unit:'杯',target:120,actual:96},
    {id:'m2',category:'おすすめドリンク出数',unit:'オーダー',target:20,actual:17,productName:'スパークリングワイングラス'}
  ];
  measures[yest]=[{id:'m3',category:'1人D売上',unit:'円',target:1300,actual:1245}];
  return {tables,days,measures,__demo:true};
}
function loadData(){
  try{
    const raw=localStorage.getItem(SKEY);
    if(raw){const d=JSON.parse(raw);if((d.tables&&d.tables.length)||(d.days&&d.days.length))return d;}
  }catch{}
  /* デモ版: データが無ければサンプルデータを投入し、目標値も初期化 */
  const demo=buildDemoData();
  try{
    localStorage.setItem(SKEY,JSON.stringify(demo));
    if(!localStorage.getItem('drink_tracker_goal'))localStorage.setItem('drink_tracker_goal','1300');
  }catch{}
  return demo;
}
function saveData(d){
  try{
    const json=JSON.stringify(d);
    localStorage.setItem(SKEY,json);
  }catch(e){
    console.error('saveData failed:',e);
    alert('⚠️ データの保存に失敗しました。ストレージ容量を確認してください。\n'+e.message);
  }
}
function loadKey(){return localStorage.getItem(KEYKEY)||''}
function saveKey(k){localStorage.setItem(KEYKEY,k)}
const GKEY='drink_tracker_goal';
function loadGoal(){return parseInt(localStorage.getItem(GKEY)||'0')||0}
function saveGoal(v){localStorage.setItem(GKEY,String(v))}
const CKEY='drink_tracker_config';
function loadConfig(){try{const c=JSON.parse(localStorage.getItem(CKEY)||'{}');return{taxRate:c.taxRate??10,serviceRate:c.serviceRate??10}}catch{return{taxRate:10,serviceRate:10}}}
function saveConfig(c){localStorage.setItem(CKEY,JSON.stringify(c))}
const MKEY='drink_tracker_master';
/* 初期マスターデータ（新規デバイスでも初回から登録済み状態） */
const DEFAULT_MASTER={
  drinks:["生ビール","プレミアム生ビール","角ハイボール","コークハイ","レモンサワー","グレープフルーツサワー","黒ウーロンハイ","緑茶ハイ","梅酒ソーダ","ジントニック","モスコミュール","カシスオレンジ","カシスソーダ","スパークリングワイングラス","白ワイングラス","赤ワイングラス","ボトルワイン(白)","ボトルワイン(赤)","日本酒 純米","日本酒 大吟醸","芋焼酎ロック","麦焼酎水割り","ハイボール","ノンアルコールビール","ノンアルカクテル","ウーロン茶","緑茶","ジンジャーエール","コーラ","オレンジジュース","カルピス","飲み放題(2時間)","飲み放題プレミアム"],
  excludes:["お通し","枝豆","冷奴","刺身盛り合わせ","本日の鮮魚","鶏の唐揚げ","だし巻き卵","シーザーサラダ","ポテトフライ","焼き鳥盛り合わせ","串カツ盛り合わせ","餃子","季節の天ぷら","ねぎとろ巻き","〆のラーメン","鯛茶漬け","デザート盛り合わせ","バニラアイス","おまかせコース","宴会コース","ランチセット","サービス料"],
  seats:["テーブル：T1","テーブル：T2","テーブル：T3","テーブル：T4","テーブル：T5","テーブル：T6","テーブル：T7","テーブル：T8","カウンター：C1","カウンター：C2","カウンター：C3","カウンター：C4","カウンター：C5","カウンター：C6","個室：座敷1","個室：座敷2"]
};
function loadMaster(){
  try{
    const raw=localStorage.getItem(MKEY);
    /* 未設定デバイスはデフォルトマスターを書き込んで返す */
    if(!raw){saveMaster(DEFAULT_MASTER);return DEFAULT_MASTER;}
    const m=JSON.parse(raw);
    return{drinks:m.drinks||[],excludes:m.excludes||[],seats:m.seats||[]};
  }catch{return DEFAULT_MASTER;}
}
function saveMaster(m){localStorage.setItem(MKEY,JSON.stringify(m))}
function fmt(n,d=0){const v=parseFloat(n||0);return isNaN(v)?'0':v.toLocaleString('ja-JP',{maximumFractionDigits:d})}
function today(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function weekLabel(d){const dt=new Date(d+'T00:00:00');return`${dt.getMonth()+1}/${dt.getDate()}(${DAYS[dt.getDay()]})`}
function getDOW(d){return DAYS[new Date(d+'T00:00:00').getDay()]}

/* POS CSV（UTF-16LE/Shift-JIS・タブ区切り）を日付→値マップにパース */
function parsePosCSVByDate(text){
  const result={};
  /* BOM文字(﻿)を除去 */
  const clean=text.replace(/^﻿/,'');
  for(const line of clean.split(/\r?\n/)){
    /* タブ区切り・ダブルクォート除去・前後空白除去 */
    const cols=line.split('\t').map(c=>c.trim().replace(/^"+|"+$/g,'').trim());
    if(cols.length<5)continue;
    /* 日付カラム（index 2）: "2026/05/01(木)" 形式 */
    const m=(cols[2]||'').match(/(\d{4})\/(\d{2})\/(\d{2})/);
    if(!m)continue;
    const date=`${m[1]}-${m[2]}-${m[3]}`;
    /* 合計カラム（末尾）: "142,640" or "¥142,640" → 数値 */
    const raw=cols[cols.length-1];
    const num=parseInt(raw.replace(/[^0-9]/g,''))||0;
    if(num>0)result[date]=num;
  }
  return result;
}

/* POS照合ビュー */
function PosCompareView({data,setData,config}){
  const {useState,useMemo,useRef}=React;
  /* 月次と同じ税抜・サービス料抜き換算 */
  const netFactor=1/((1+((config&&config.taxRate)||0)/100)*(1+((config&&config.serviceRate)||0)/100));
  const net=v=>Math.round((v||0)*netFactor);
  const [msg,setMsg]=useState('');
  const salesRef=useRef();
  const coversRef=useRef();
  const posData=data.posData||{};

  const loadFile=(file,type)=>{
    if(!file)return;
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        /* BOMからエンコーディングを自動判定 */
        const buf=e.target.result;
        const b=new Uint8Array(buf);
        const enc=b[0]===0xFF&&b[1]===0xFE?'utf-16le'
          :b[0]===0xFE&&b[1]===0xFF?'utf-16be'
          :b[0]===0xEF&&b[1]===0xBB&&b[2]===0xBF?'utf-8'
          :'shift-jis';
        const text=new TextDecoder(enc).decode(buf);
        const parsed=parsePosCSVByDate(text);
        const count=Object.keys(parsed).length;
        if(!count)throw new Error('日付データが見つかりませんでした（Shift-JIS形式か確認してください）');
        setData(prev=>{
          const pos={...(prev.posData||{})};
          Object.entries(parsed).forEach(([d,v])=>{if(!pos[d])pos[d]={};pos[d][type]=v;});
          return{...prev,posData:pos};
        });
        setMsg(`✓ ${type==='sales'?'売上':'客数'}CSV: ${count}日分を読み込みました`);
      }catch(err){setMsg('❌ '+err.message);}
    };
    reader.readAsArrayBuffer(file);
  };

  const rows=useMemo(()=>{
    const dates=new Set([...Object.keys(posData),...(data.days||[]).map(d=>d.date)]);
    return[...dates].sort().map(date=>{
      const pos=posData[date]||{};
      const app=(data.days||[]).find(d=>d.date===date);
      /* 照合は生数値（税込）で比較 — 月次のnet()は適用しない */
      const appSales=app?.totalSales!=null?app.totalSales:null;
      const sDiff=pos.sales!=null&&appSales!=null?appSales-pos.sales:null;
      const cDiff=pos.covers!=null&&app?.totalCovers!=null?app.totalCovers-pos.covers:null;
      const sPct=pos.sales>0&&sDiff!==null?Math.abs(sDiff/pos.sales*100):null;
      const status=pos.sales==null&&pos.covers==null?'apponly'
        :!app?'noapp'
        :sPct>10||Math.abs(cDiff||0)>5?'danger'
        :sPct>3||Math.abs(cDiff||0)>2?'warn'
        :'ok';
      return{date,pos,app,appSales,sDiff,cDiff,sPct,status};
    });
  },[posData,data.days,netFactor]);

  const counts={ok:rows.filter(r=>r.status==='ok').length,warn:rows.filter(r=>r.status==='warn').length,danger:rows.filter(r=>r.status==='danger').length,noapp:rows.filter(r=>r.status==='noapp').length};

  return React.createElement('div',null,
    /* アップロードエリア */
    React.createElement('div',{className:'card',style:{marginBottom:10}},
      React.createElement('div',{style:{fontSize:13,fontWeight:700,marginBottom:10,display:'flex',alignItems:'center',gap:6}},
        React.createElement('i',{className:'ti ti-file-spreadsheet',style:{color:'var(--blue)'}}),
        'POSデータをアップロード'
      ),
      React.createElement('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:8}},
        ['sales','covers'].map(type=>React.createElement('label',{key:type,style:{display:'flex',flexDirection:'column',gap:4,cursor:'pointer',padding:'10px 12px',border:'1px dashed var(--border2)',borderRadius:'var(--r)',textAlign:'center',background:'var(--surface)'}},
          React.createElement('i',{className:`ti ti-${type==='sales'?'currency-yen':'users'}`,style:{fontSize:20,color:'var(--blue)'}}),
          React.createElement('span',{style:{fontSize:12,fontWeight:600}},type==='sales'?'売上CSV':'客数CSV'),
          React.createElement('span',{style:{fontSize:10,color:'var(--text3)'}},'（Shift-JIS・タブ区切り）'),
          React.createElement('input',{type:'file',accept:'.csv,.tsv,text/*',style:{display:'none'},
            onChange:e=>loadFile(e.target.files[0],type)})
        ))
      ),
      msg&&React.createElement('div',{style:{fontSize:12,color:msg.startsWith('❌')?'var(--red)':'var(--green)',padding:'6px 8px',background:msg.startsWith('❌')?'#fee2e2':'#f0fdf4',borderRadius:'var(--r)'}},msg),
      Object.keys(posData).length>0&&React.createElement('button',{
        onClick:()=>{if(window.confirm('POSデータを削除しますか？'))setData(prev=>({...prev,posData:{}}));},
        style:{marginTop:8,padding:'4px 10px',fontSize:11,color:'var(--text3)'}
      },'POSデータをクリア')
    ),
    /* サマリー */
    rows.length>0&&React.createElement('div',{style:{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:6,marginBottom:10}},
      [{l:'一致',v:counts.ok,c:'var(--green)',bg:'#f0fdf4'},{l:'要確認',v:counts.warn,c:'var(--amber)',bg:'#fffbeb'},{l:'ズレあり',v:counts.danger,c:'#ef4444',bg:'#fee2e2'},{l:'未入力',v:counts.noapp,c:'var(--text3)',bg:'var(--surface)'}]

/* ── PDF.js テキスト抽出 ── */
async function loadPDFJS(){
  if(window.pdfjsLib)return;
  await new Promise((res,rej)=>{
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
    s.onload=res;s.onerror=rej;document.head.appendChild(s);
  });
  window.pdfjsLib.GlobalWorkerOptions.workerSrc=
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
}

async function extractPDFText(b64){
  await loadPDFJS();
  const bin=atob(b64),bytes=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
  const pdf=await pdfjsLib.getDocument({data:bytes.buffer}).promise;
  let text='';
  for(let p=1;p<=pdf.numPages;p++){
    const page=await pdf.getPage(p);
    const viewport=page.getViewport({scale:1});
    const midX=viewport.width/2;
    const content=await page.getTextContent();
    /* 左右カラムに分離してからY座標でグループ化 */
    const processCol=items=>{
      const groups=[];
      for(const item of items){
        const y=item.transform[5],x=item.transform[4];
        const g=groups.find(g=>Math.abs(g.y-y)<=3);
        if(g)g.items.push({x,str:item.str});
        else groups.push({y,items:[{x,str:item.str}]});
      }
      groups.sort((a,b)=>b.y-a.y);
      return groups.map(g=>{
        g.items.sort((a,b)=>a.x-b.x);
        return g.items.map(i=>i.str).join('');
      }).filter(l=>l.trim()).join('\n');
    };
    const left=content.items.filter(i=>i.transform[4]<midX);
    const right=content.items.filter(i=>i.transform[4]>=midX);
    text+=processCol(left)+'\n'+processCol(right)+'\n--- PAGE BREAK ---\n';
  }
  /* NFKC正規化：康熙部首(⽇⼈⼋等)→通常漢字(日人八等)に変換 */
  return text.normalize('NFKC');
}

/* ── 伝票ジャーナル ルールベースパーサー ── */
function parseJournalText(text,masterDrinks=[],masterExcludes=[]){
  /* 全日付の出現位置を収集 */
  const dateChanges=[];
  const dateRe=/営業日付[：:\s]*(\d{4})年\s*(\d{1,2})月\s*(\d{1,2})日/g;
  let dm;
  while((dm=dateRe.exec(text))!==null){
    const d=`${dm[1]}-${String(dm[2]).padStart(2,'0')}-${String(dm[3]).padStart(2,'0')}`;
    if(!dateChanges.length||dateChanges[dateChanges.length-1].date!==d)
      dateChanges.push({date:d,index:dm.index});
  }
  if(!dateChanges.length)return null;

  /* 伝票ブロックのインデックスを収集 */
  const ticketRe=/.\s*伝票\s*No[.\．]/g;
  const ticketIdxs=[];
  let tm2;
  while((tm2=ticketRe.exec(text))!==null)ticketIdxs.push(tm2.index);
  if(!ticketIdxs.length)return null;

  /* 各伝票ブロックの日付を特定（直前の営業日付を使用） */
  const getDate=idx=>{
    let d=dateChanges[0].date;
    for(const dc of dateChanges){if(dc.index<=idx)d=dc.date;else break;}
    return d;
  };

  /* ドリンク判定 */
  const DRINK_KW=['ビール','ワイン','日本酒','焼酎','カクテル','ハイボール','サワー','ウーロン','ジュース','コーラ','コーヒー','お茶','緑茶','スパークリング','シャンパン','梅酒','リキュール','紹興酒','ウイスキー','ブランデー','ミネラルウォーター','ソフトドリンク','ノンアルコール','レモン水','水','泡盛'];
  const FOOD_KW=['コース','ランチ','ディナー','フード','料理','サービス料','チャージ'];
  const norm=s=>s.replace(/\s/g,'');
  const isDrink=name=>{
    if(!name)return false;
    const n=norm(name);
    if(masterExcludes.some(e=>n.includes(norm(e))))return false;
    if(masterDrinks.some(d=>{const dn=norm(d);return n.includes(dn)||dn.includes(n);}))return true;
    if(FOOD_KW.some(k=>n.includes(k)))return false;
    if(DRINK_KW.some(k=>n.includes(k)))return true;
    return false;
  };

  /* 伝票ブロックを処理（インデックスベースで日付を追跡） */
  const allTables=[];
  for(let bi=0;bi<ticketIdxs.length;bi++){
    const start=ticketIdxs[bi];
    const end=ticketIdxs[bi+1]??text.length;
    const block=text.slice(start,end);
    const blockDate=getDate(start);
    if(!block.includes('会計済'))continue;

    const seatM=block.match(/テーブル[：:\s]*([^\s　]+)[\s　]+人数[：:\s]*(\d+)/);
    if(!seatM)continue;
    const seat=seatM[1].replace(/[：:]/g,'');
    const covers=parseInt(seatM[2])||0;

    const timeM=block.match(/退店時間[：:\s]*(\d{1,2}:\d{2})/);
    const time=timeM?timeM[1].padStart(5,'0'):'';

    /* 品目解析 */
    const lines=block.split('\n').map(l=>l.trim()).filter(Boolean);
    const drinks=[];
    let drinkTotal=0,foodTotal=0,lastItem='';
    const SKIP_RE=/^(合計|小計|税|サービス|現金|クレジット|電子|お預かり|おつり|品名|数量|金額|点数|登録|事業|状態|POS|入店|退店|テーブル|店舗|営業|担当|---|※|2店舗|端数)/;
    const addItem=(name,qty,unitPrice,subtotal)=>{
      if(!name||subtotal<=0)return;
      if(isDrink(name)){drinks.push({name,qty,unitPrice,subtotal});drinkTotal+=subtotal;}
      else{foodTotal+=subtotal;}
    };
    for(const line of lines){
      if(SKIP_RE.test(line))continue;
      if(/^[\d¥￥,\s\-\.\/%×x×]+$/.test(line))continue;
      /* 1行フォーマット: 品名 ... 単価×数量 ... 小計 */
      const sl=line.match(/^(.+?)\s{2,}(\d[\d,]*)\s*[×x×Xx]\s*(\d+)\s*[¥￥]?\s*([\d,]+)$/);
      if(sl){
        const iname=sl[1].trim();
        if(iname&&!SKIP_RE.test(iname))
          addItem(iname,parseInt(sl[3]),parseInt(sl[2].replace(/,/g,'')),parseInt(sl[4].replace(/,/g,'')));
        lastItem='';continue;
      }
      /* 2行フォーマット: 単価×数量 ¥小計（前行が品名） */
      const pm=line.match(/^([\d,]+)\s*[×x×Xx]\s*(\d+)\s*[¥￥\\]?\s*([\d,]+)/);
      if(pm){
        if(lastItem)addItem(lastItem,parseInt(pm[2]),parseInt(pm[1].replace(/,/g,'')),parseInt(pm[3].replace(/,/g,'')));
        lastItem='';continue;
      }
      /* 品名行（次の価格行まで保持） */
      if(line.length<=50)lastItem=line;
    }


    /* 税抜合計（1テーブルとして非現実的な金額はdrinkTotal+foodTotalで代替） */
    const MAX_PER_TABLE=500000;
    const totalM=block.match(/税抜合計[\s　]*[¥￥\\]?\s*([\d,]+)/);
    const totalRaw=totalM?parseInt(totalM[1].replace(/,/g,'')):0;
    const total=totalRaw>0&&totalRaw<=MAX_PER_TABLE?totalRaw:(drinkTotal+foodTotal);

    /* コース名（店舗名・ヘッダー行は除外） */
    const COURSE_KW=['コース','ランチ','ディナー','フード'];
    const COURSE_SKIP=/^(合計|小計|税|サービス|登録|事業|店舗|営業|担当|POS|テーブル|入店|退店|状態|品名|数量|金額)/;
    const courseLine=lines.find(l=>COURSE_KW.some(k=>l.includes(k))&&!COURSE_SKIP.test(l));
    const course=courseLine||'';

    /* covers=0は人数不明として除外 */
    if(covers===0)continue;
    if(total>0||drinkTotal>0){
      allTables.push({date:blockDate,time,seat,covers,course,drinks,drinkTotal,foodTotal,total,
        drinkPerCover:covers>0?drinkTotal/covers:0,
        drinksPerCover:covers>0?drinks.reduce((s,d)=>s+d.qty,0)/covers:0});
    }
  }

  if(!allTables.length)return null;

  /* 日付ごとにグループ化して日次レコードを生成 */
  const dateMap={};
  for(const t of allTables){
    if(!dateMap[t.date])dateMap[t.date]=[];
    dateMap[t.date].push(t);
  }
  const isLunch=t=>t.time>='10:00'&&t.time<'17:00';
  return Object.entries(dateMap).sort((a,b)=>a[0].localeCompare(b[0])).map(([date,tables])=>{
    const totalSales=tables.reduce((s,t)=>s+t.total,0);
    const drinkSales=tables.reduce((s,t)=>s+t.drinkTotal,0);
    const totalCovers=tables.reduce((s,t)=>s+t.covers,0);
    const drinkCount=tables.reduce((s,t)=>s+t.drinks.reduce((ss,d)=>ss+d.qty,0),0);
    const lT=tables.filter(isLunch),dT=tables.filter(t=>!isLunch(t));
    return{date,totalSales,drinkSales,foodSales:totalSales-drinkSales,
      totalCovers,drinkCount,tableCount:tables.length,
      lunchCovers:lT.reduce((s,t)=>s+t.covers,0),dinnerCovers:dT.reduce((s,t)=>s+t.covers,0),
      lunchDrinkSales:lT.reduce((s,t)=>s+t.drinkTotal,0),dinnerDrinkSales:dT.reduce((s,t)=>s+t.drinkTotal,0),
      drinkPerCover:totalCovers>0?drinkSales/totalCovers:0,
      drinkRatio:totalSales>0?drinkSales/totalSales:0,
      notes:'',tables};
  });
}

async function tryParseJournalPDF(b64,masterDrinks,masterExcludes){
  try{
    const text=await extractPDFText(b64);
    return parseJournalText(text,masterDrinks,masterExcludes);
  }catch(e){console.warn('Journal PDF parse failed:',e.message);return null;}
}

async function callVision(apiKey,b64,mime,prompt,maxTokens=2000){
  const gasUrl=localStorage.getItem(GAS_URL_KEY)||DEFAULT_GAS_URL;

  /* ── GAS経由（スタッフはAPIキー不要） ── */
  if(gasUrl){
    const res=await fetch(gasUrl,{
      method:'POST',
      headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({type:'analyze',image:b64||null,mime:mime||null,prompt,maxTokens})
    });
    if(!res.ok)throw new Error('GAS接続エラー: '+res.status);
    const data=await res.json();
    if(!data.success)throw new Error(data.error||'GAS解析失敗');
    return data.text;
  }

  /* ── フォールバック：直接API呼び出し（APIキーが必要） ── */
  if(!apiKey)throw new Error('APIキーが設定されていません（設定タブから入力）');
  const content=[];
  if(b64){
    content.push(mime==='application/pdf'
      ?{type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}}
      :{type:'image',source:{type:'base64',media_type:mime,data:b64}});
  }
  content.push({type:'text',text:prompt});
  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:MODEL,max_tokens:maxTokens,messages:[{role:'user',content}]})
  });
  const data=await res.json();
  if(data.error)throw new Error(data.error.message);
  return data.content[0].text;
}
function toB64(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result.split(',')[1]);
    r.onerror=()=>rej(new Error('読み込み失敗'));
    r.readAsDataURL(file);
  });
}
/* 画像をリサイズ圧縮してBase64を返す（APIの5MB制限対策） */
async function compressImage(file,maxPx=1600){
  if(file.type==='application/pdf'){
    const b64=await toB64(file);
    return{b64,mime:'application/pdf'};
  }
  return new Promise((res,rej)=>{
    const img=new Image();
    const url=URL.createObjectURL(file);
    img.onload=()=>{
      try{
        const s=Math.min(1,maxPx/Math.max(img.width,img.height,1));
        const c=document.createElement('canvas');
        c.width=Math.round(img.width*s);c.height=Math.round(img.height*s);
        c.getContext('2d').drawImage(img,0,0,c.width,c.height);
        URL.revokeObjectURL(url);
        c.toBlob(blob=>{
          if(!blob)return rej(new Error('圧縮失敗'));
          const r=new FileReader();
          r.onload=e=>res({b64:e.target.result.split(',')[1],mime:'image/jpeg'});
          r.onerror=()=>rej(new Error('読み込み失敗'));
          r.readAsDataURL(blob);
        },'image/jpeg',0.85);
      }catch(e){rej(e);}
    };
    img.onerror=()=>rej(new Error('画像読み込み失敗'));
    img.src=url;
  });
}

/* ── Simple Bar Chart (pure SVG, no deps) ── */
function BarChart({data,valueKey,labelKey,color='#3b6bde',height=180,goalValue}){
  const [tip,setTip]=useState(null);
  if(!data||!data.length)return null;
  const vals=data.map(d=>parseFloat(d[valueKey])||0);
  const max=Math.max(...vals,goalValue||0)||1;
  const W=600,H=height,PL=10,PR=28,PT=10,PB=32;
  const chartW=W-PL-PR;
  const barW=Math.max(8,chartW/data.length*0.6);
  const gap=chartW/data.length;
  const goalY=goalValue&&goalValue<=max?PT+(H-PT-PB)*(1-goalValue/max):null;
  return React.createElement('div',{className:'chart-wrap',style:{height:H+40}},
    React.createElement('svg',{viewBox:`0 0 ${W} ${H}`,style:{width:'100%',height:H}},
      React.createElement('line',{x1:PL,y1:PT,x2:PL,y2:H-PB,stroke:'#e5e5e0',strokeWidth:1}),
      React.createElement('line',{x1:PL,y1:H-PB,x2:W-PR,y2:H-PB,stroke:'#e5e5e0',strokeWidth:1}),
      [0.25,0.5,0.75,1].map(r=>{
        const y=PT+(H-PT-PB)*(1-r);
        return React.createElement('g',{key:r},
          React.createElement('line',{x1:PL,y1:y,x2:W-PR,y2:y,stroke:'#f0efe9',strokeWidth:1}),
          React.createElement('text',{x:PL-2,y:y+3,textAnchor:'end',fontSize:8,fill:'#9e9d96'},`¥${fmt(max*r,0)}`)
        );
      }),
      data.map((d,i)=>{
        const v=vals[i];
        const bh=(v/max)*(H-PT-PB);
        const x=PL+i*gap+gap/2;
        const y=H-PB-bh;
        return React.createElement('g',{key:i,style:{cursor:'pointer'},
          onMouseEnter:e=>setTip({i,x,v,label:d[labelKey]}),
          onMouseLeave:()=>setTip(null)
        },
          React.createElement('rect',{x:x-barW/2,y,width:barW,height:bh,fill:tip&&tip.i===i?'#2050c0':color,rx:3}),
          React.createElement('text',{x,y:H-PB+14,textAnchor:'middle',fontSize:9,fill:'#9e9d96'},d[labelKey])
        );
      }),
      goalY!=null&&React.createElement('g',null,
        React.createElement('line',{x1:PL,y1:goalY,x2:W-PR,y2:goalY,stroke:'#ef4444',strokeWidth:1.5,strokeDasharray:'5,3'}),
        React.createElement('text',{x:W-PR+3,y:goalY+3,fontSize:8,fill:'#ef4444',fontWeight:600},'目標')
      )
    ),
    tip&&React.createElement('div',{className:'bar-tooltip',style:{top:10,left:`${(tip.x/W)*100}%`}},
      `${tip.label}: ¥${fmt(tip.v,0)}`
    )
  );
}

/* ── Upload Zone ── */
function UploadZone({onFile,label,hint,accept}){
  const ref=useRef();
  const handle=f=>{if(f&&(f.type.startsWith('image/')||f.type==='application/pdf'||f.name?.toLowerCase().endsWith('.csv')||f.type==='text/csv'||f.type==='text/plain'))onFile(f)};
  return React.createElement('div',{
    className:'upload-zone',
    onClick:()=>ref.current.click(),
    onDragOver:e=>e.preventDefault(),
    onDrop:e=>{e.preventDefault();handle(e.dataTransfer.files[0])}
  },
    React.createElement('input',{ref,type:'file',accept:accept||'image/*,.pdf',style:{display:'none'},onChange:e=>handle(e.target.files[0])}),
    React.createElement('i',{className:'ti ti-file-upload',style:{fontSize:28,color:'var(--text3)',marginBottom:6,display:'block'}}),
    React.createElement('div',{style:{fontSize:14,fontWeight:600,color:'var(--text2)'}},label||'写真 / PDFをアップロード'),
    hint&&React.createElement('div',{style:{fontSize:11,color:'var(--text3)',marginTop:4}},hint)
  );
}

      const masterNote=masterDrinks.length
        ?`\n【この店の登録済みドリンク商品マスター】以下の品名（または部分一致）は必ずdrinksに含めること：\n${masterDrinks.join('、')}\nマスターにない品名はドリンクかどうかを一般的な知識で判断する。`

      const excludeNote=(masterExcludes&&masterExcludes.length)

      const seatNote=(masterSeats&&masterSeats.length)

`このレストランのレシートを解析してください。JSONのみで返答（説明文・コードブロック不要）：

timeは「退店時間」をHH:MM形式で抽出する（入店時間ではなく）。読み取れない場合は空文字""。
【drinksの列挙ルール】以下のいずれかに該当する品目のみdrinksに含める：
①アルコール類：生ビール・瓶ビール・ビール銘柄（例：白穂乃香・エビス・プレミアムモルツ等）、ワイン・シャンパン・スパークリング、日本酒・銘柄酒（例：獺祭・久保田等）、焼酎・泡盛、ウイスキー・ブランデー、カクテル・サワー・ハイボール、梅酒・リキュール、紹興酒・中国酒

品名だけでは判断できない場合は単価・文脈から推測すること。料理・フード・コース料金・サービス料は絶対にdrinksに含めないこと。drinkTotalはdrinksの合計金額と一致させること。不明な金額は0。${excludeNote}${masterNote}${seatNote}`

      parsed.drinksPerCover=parsed.covers>0?(parsed.drinks||[]).reduce((s,d)=>s+(d.qty||0),0)/parsed.covers:0;
      setResult(parsed);

            React.createElement('span',{style:{fontSize:13,fontWeight:600,wordBreak:'break-all'}},fileName)

        React.createElement('button',{onClick:clearFile,style:{flex:1}},

        ),
        React.createElement('button',{onClick:analyze,disabled:loading||(!apiKey&&!(localStorage.getItem(GAS_URL_KEY)||DEFAULT_GAS_URL)),style:{flex:2,background:'var(--blue)',color:'#fff',border:'none',fontWeight:600,justifyContent:'center'}},
          loading?[React.createElement('i',{key:'i',className:'ti ti-loader spin'}),' 解析中...']

      result&&React.createElement('div',null,

          React.createElement('i',{className:'ti ti-check-circle'}),' 解析完了 — 内容を確認してください'
        ),
        React.createElement('div',{className:'grid2',style:{marginBottom:10}},
          [{l:'人数',v:`${result.covers}名`},{l:'合計',v:`¥${fmt(result.total)}`},{l:'ドリンク計',v:`¥${fmt(result.drinkTotal)}`,c:'var(--blue)'},{l:'フード計',v:`¥${fmt(result.foodTotal)}`},{l:'1人あたりドリンク',v:`¥${fmt(result.drinkPerCover,0)}`,c:'var(--blue)'},{l:'1人D杯数',v:`${fmt(result.drinksPerCover,1)}杯`,c:'var(--blue)'}]
          .map(({l,v,c})=>React.createElement('div',{key:l,className:'metric-card'},
            React.createElement('div',{className:'metric-val',style:c?{color:c}:{}},v),
            React.createElement('div',{className:'metric-lbl'},l)
          ))
        ),
        React.createElement('div',{style:{display:'flex',gap:8,flexWrap:'wrap',marginBottom:8}},
          result.seat&&React.createElement('div',{style:{display:'inline-flex',alignItems:'center',gap:4,padding:'3px 10px',background:'#f0fdf4',border:'1px solid #86efac',borderRadius:20,fontSize:12,color:'var(--green)'}},
            React.createElement('i',{className:'ti ti-armchair'}),result.seat
          ),
          result.course&&React.createElement('div',{style:{display:'inline-flex',alignItems:'center',gap:4,padding:'3px 10px',background:'var(--surface2)',border:'1px solid var(--border2)',borderRadius:20,fontSize:12,color:'var(--text2)'}},

          React.createElement('div',{className:'lbl',style:{marginBottom:6}},'ドリンク内訳'),
          React.createElement('div',{className:'scroll-x'},
            React.createElement('table',null,
              React.createElement('thead',null,React.createElement('tr',null,['品名','数量','単価','小計'].map(h=>React.createElement('th',{key:h},h)))),

  if(!goal||!drinkPerCover)return null;

  const bg=pct>=100?'#f0fdf4':pct>=80?'#fffbeb':'#fff5f5';

/* ── 人件費・食材費カード（FL管理） ── */
function LaborFoodCard({date,data,setData}){
  const dayRec=(data.days||[]).find(d=>d.date===date);
  const [labor,setLabor]=useState(String(dayRec?.laborCost||''));
  const [food,setFood]=useState(String(dayRec?.foodCost||''));
  const [msg,setMsg]=useState('');
  const [csvMsg,setCsvMsg]=useState('');
  const [showCsv,setShowCsv]=useState(false);
  const csvRef=useRef();

  const totalSales=dayRec?.totalSales||0;
  const lv=parseInt(labor)||0;
  const fv=parseInt(food)||0;
  const lRatio=totalSales>0&&lv>0?lv/totalSales:null;
  const fRatio=totalSales>0&&fv>0?fv/totalSales:null;
  const flRatio=totalSales>0&&(lv+fv)>0?(lv+fv)/totalSales:null;
  const flColor=flRatio===null?'var(--text3)':flRatio<=0.55?'var(--green)':flRatio<=0.65?'var(--amber)':'#ef4444';
  const flBorder=flRatio===null?'var(--border)':flRatio<=0.55?'#86efac':flRatio<=0.65?'#fcd34d':'#fca5a5';
  const flBg=flRatio===null?'var(--surface)':flRatio<=0.55?'#f0fdf4':flRatio<=0.65?'#fffbeb':'#fff5f5';
  const flLabel=flRatio===null?null:flRatio<=0.55?'✅ 良好':flRatio<=0.65?'⚠️ 要注意':'🔴 要改善';
  const hasSaved=!!(dayRec?.laborCost||dayRec?.foodCost);

  const handleSave=()=>{
    const updated={...dayRec,laborCost:lv,foodCost:fv};
    setData(prev=>({...prev,days:(prev.days||[]).map(d=>d.date===date?updated:d)}));
    postDayToGas(updated);/* GASにも送信 */
    setMsg('保存しました');setTimeout(()=>setMsg(''),2000);
  };

  const handleCsvFile=async f=>{
    setCsvMsg('');
    try{
      const text=await f.text();
      const lines=text.trim().split(/\r?\n/).filter(Boolean);
      if(!lines.length)throw new Error('ファイルが空です');
      const fl=lines[0].toLowerCase();
      const skip=fl.includes('date')||fl.includes('日付')||fl.includes('labor')||fl.includes('人件費');
      const rows=skip?lines.slice(1):lines;
      const updates={};
      rows.forEach(line=>{
        const p=line.split(',').map(s=>s.trim().replace(/^"|"$/g,'').replace(/[¥,]/g,''));
        if(!p[0]||!/^\d{4}-\d{2}-\d{2}$/.test(p[0]))return;
        updates[p[0]]={laborCost:parseInt(p[1])||0,foodCost:p[2]?parseInt(p[2])||0:0};
      });
      const cnt=Object.keys(updates).length;
      if(!cnt)throw new Error('有効なデータが見つかりません（形式：日付,人件費,食材費）');
      setData(prev=>({...prev,days:(prev.days||[]).map(d=>updates[d.date]?{...d,...updates[d.date]}:d)}));
      if(updates[date]){setLabor(String(updates[date].laborCost||''));setFood(String(updates[date].foodCost||''));}
      setCsvMsg(`✓ ${cnt}日分のインポート完了`);
    }catch(e){setCsvMsg('エラー: '+e.message);}
  };

  return React.createElement('div',{className:'card',style:{marginBottom:12,background:flBg,border:`0.5px solid ${flBorder}`}},
    /* ヘッダー */
    React.createElement('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}},
      React.createElement('div',{style:{fontSize:13,fontWeight:700,display:'flex',alignItems:'center',gap:6}},
        React.createElement('i',{className:'ti ti-chart-pie',style:{color:'var(--blue)'}}),
        '業績入力（FL管理）'
      ),
      hasSaved&&React.createElement('span',{style:{fontSize:11,color:'var(--green)',display:'flex',alignItems:'center',gap:3,padding:'2px 8px',background:'#dcfce7',borderRadius:20}},
        React.createElement('i',{className:'ti ti-check-circle'}),' 入力済み'
      )
    ),
    /* 入力フィールド */
    React.createElement('div',{className:'grid2',style:{marginBottom:10}},
      React.createElement('div',null,
        React.createElement('label',{className:'lbl'},'人件費（円）'),
        React.createElement('input',{type:'number',value:labor,onChange:e=>setLabor(e.target.value),placeholder:'例: 63000'})
      ),
      React.createElement('div',null,
        React.createElement('label',{className:'lbl'},'食材費・原価（円）'),
        React.createElement('input',{type:'number',value:food,onChange:e=>setFood(e.target.value),placeholder:'例: 85000'})
      )
    ),
    /* FL比率表示 */
    (lv>0||fv>0)&&React.createElement('div',null,
      React.createElement('div',{style:{display:'flex',gap:8,marginBottom:8}},
        React.createElement('div',{className:'metric-card',style:{flex:2,border:`1.5px solid ${flColor}`}},
          React.createElement('div',{className:'metric-val',style:{fontSize:22,color:flColor}},
            flRatio!==null?`${(flRatio*100).toFixed(1)}%`:'—'
          ),
          React.createElement('div',{className:'metric-lbl'},'FL比率'),
          flLabel&&React.createElement('div',{style:{fontSize:11,marginTop:3,color:flColor,fontWeight:600}},flLabel)
        ),
        React.createElement('div',{style:{flex:1,display:'flex',flexDirection:'column',gap:6}},
          React.createElement('div',{className:'metric-card'},
            React.createElement('div',{className:'metric-val',style:{fontSize:14}},fRatio!==null?`${(fRatio*100).toFixed(1)}%`:'—'),
            React.createElement('div',{className:'metric-lbl'},'F比率（原価）')
          ),
          React.createElement('div',{className:'metric-card'},
            React.createElement('div',{className:'metric-val',style:{fontSize:14}},lRatio!==null?`${(lRatio*100).toFixed(1)}%`:'—'),
            React.createElement('div',{className:'metric-lbl'},'L比率（人件費）')
          )
        )
      ),
      /* プログレスバー */
      React.createElement('div',{style:{marginBottom:10}},
        React.createElement('div',{style:{position:'relative',height:10,background:'var(--surface3)',borderRadius:5,marginBottom:6}},
          React.createElement('div',{style:{position:'absolute',left:0,top:0,height:'100%',width:`${Math.min((flRatio||0)*100,100)}%`,background:flColor,borderRadius:5,transition:'width .4s'}}),
          React.createElement('div',{style:{position:'absolute',left:'55%',top:-2,bottom:-2,width:2,background:'rgba(42,158,85,0.5)',borderRadius:1}}),
          React.createElement('div',{style:{position:'absolute',left:'65%',top:-2,bottom:-2,width:2,background:'rgba(220,38,38,0.4)',borderRadius:1}})
        ),
        React.createElement('div',{style:{display:'flex',justifyContent:'space-between',fontSize:9,color:'var(--text3)'}},
          React.createElement('span',null,'0%'),
          React.createElement('span',{style:{color:'var(--green)'}},'55%良好'),
          React.createElement('span',{style:{color:'var(--red)'}},'65%危険'),
          React.createElement('span',null,'100%')

    /* 保存・CSV */

      React.createElement('pre',{style:{fontFamily:'monospace',fontSize:10,color:'var(--text2)',background:'var(--surface2)',padding:'6px 8px',borderRadius:4,marginBottom:8,overflowX:'auto',lineHeight:1.6}},
        '日付,人件費,食材費\n2026-05-28,63000,85000\n2026-05-27,58000,72000'

    tableRecords.map(t=>React.createElement('div',{key:t.id,className:'card-sm',style:{marginBottom:6,borderLeft:'3px solid var(--blue)',display:'flex',justifyContent:'space-between',alignItems:'center'}},
      React.createElement('div',null,
        React.createElement('div',{style:{fontSize:12,fontWeight:600}},[t.time,' · ',t.covers,'名',t.seat?` · 🪑${t.seat}`:'',t.course?` · ${t.course}`:'']),
        React.createElement('div',{style:{fontSize:11,color:'var(--text2)'}},`ドリンク ¥${fmt(t.drinkTotal)} · 合計 ¥${fmt(t.total)}`)
      ),
      React.createElement('div',{style:{display:'flex',alignItems:'center',gap:8}},
        React.createElement('div',{style:{textAlign:'right'}},
          React.createElement('div',{style:{fontSize:15,fontWeight:700,color:'var(--blue)'}},`¥${fmt(t.drinkPerCover,0)}`),
          React.createElement('div',{style:{fontSize:10,color:'var(--text3)'}},'1人あたり')
        ),
        React.createElement('button',{onClick:()=>delTable(t.id),style:{padding:'4px 8px',fontSize:11,color:'var(--red)',borderColor:'#fca5a5',background:'#fee2e2'}},
          React.createElement('i',{className:'ti ti-trash'})
        )
      )
    ))
  );

  return React.createElement('div',null,
    React.createElement(GoalBar,{goal,setGoal}),
    React.createElement(MeasuresCard,{date:dateStr,data,setData}),
    React.createElement('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}},
      React.createElement('div',{style:{fontSize:14,fontWeight:700}},new Date().toLocaleDateString('ja-JP',{month:'long',day:'numeric',weekday:'short'})),
      React.createElement('div',{style:{display:'flex',alignItems:'center',gap:8}},
        /* Sheets同期ステータス */
        syncStatus&&React.createElement('div',{style:{fontSize:11,display:'flex',alignItems:'center',gap:4,padding:'3px 8px',borderRadius:20,
          background:syncStatus==='syncing'?'var(--surface2)':syncStatus==='ok'?'#f0fdf4':'#fee2e2',
          color:syncStatus==='syncing'?'var(--text3)':syncStatus==='ok'?'var(--green)':'var(--red)',
          border:'0.5px solid',borderColor:syncStatus==='syncing'?'var(--border)':syncStatus==='ok'?'#86efac':'#fca5a5'}},
          syncStatus==='syncing'?[React.createElement('i',{key:'i',className:'ti ti-loader spin',style:{fontSize:11}}),'Sheets送信中...']
          :syncStatus==='ok'?[React.createElement('i',{key:'i',className:'ti ti-cloud-check',style:{fontSize:11}}),'Sheets反映済み']
          :[React.createElement('i',{key:'i',className:'ti ti-cloud-off',style:{fontSize:11}}),'Sheets送信失敗']
        ),
        React.createElement('div',{className:'seg-ctrl'},
          [{v:'table',l:`テーブル(${tableRecords.length})`},{v:'close',l:'日次締め'}].map(({v,l})=>
            React.createElement('button',{key:v,className:`seg-btn${mode===v?' active':''}`,onClick:()=>setMode(v)},l)
          )
        )
      )
    ),
    mode==='table'&&React.createElement('div',null,
      tableRecords.length>0&&React.createElement('div',{style:{marginBottom:12}},
        tableRecords.map(t=>React.createElement('div',{key:t.id,className:'card-sm',style:{marginBottom:6,borderLeft:'3px solid var(--blue)',display:'flex',justifyContent:'space-between',alignItems:'center'}},
          React.createElement('div',null,
            React.createElement('div',{style:{fontSize:12,fontWeight:600}},[t.time,' · ',t.covers,'名',t.course?` · ${t.course}`:'']),
            React.createElement('div',{style:{fontSize:11,color:'var(--text2)'}},`ドリンク¥${fmt(t.drinkTotal)} · 合計¥${fmt(t.total)}`)
          ),
          React.createElement('div',{style:{display:'flex',alignItems:'center',gap:8}},
            React.createElement('div',{style:{textAlign:'right'}},
              React.createElement('div',{style:{fontSize:15,fontWeight:700,color:'var(--blue)'}},`¥${fmt(t.drinkPerCover,0)}`),
              React.createElement('div',{style:{fontSize:10,color:'var(--text3)'}},'1人あたり')
            ),
            React.createElement('button',{onClick:()=>delTable(t.id),style:{padding:'4px 8px',fontSize:11,color:'var(--red)',borderColor:'#fca5a5',background:'#fee2e2'}},
              React.createElement('i',{className:'ti ti-trash'})
            )
          )
        ))
      ),
      React.createElement(AchievementBanner,{drinkPerCover:provisionalDPC,goal,provisional:true}),
      React.createElement(TableEntry,{apiKey,date:dateStr,onSave:saveTable})
    ),
    mode==='close'&&React.createElement(DayClose,{apiKey,date:dateStr,tableRecords,onClose:closeDay})
  );
}

/* ── Reports ── */
function Reports({data,setData,goal,config}){
  const netFactor=1/((1+((config&&config.taxRate)||0)/100)*(1+((config&&config.serviceRate)||0)/100));
  const net=v=>Math.round((v||0)*netFactor);
  const [period,setPeriod]=useState('weekly');
  const [rs,setRs]=useState('');
  const [re,setRe]=useState('');
  const [pendingRs,setPendingRs]=useState('');
  const [pendingRe,setPendingRe]=useState('');
  const [weekOffset,setWeekOffset]=useState(0); /* 0=今週, -1=先週, … */
  const [expandedSeat,setExpandedSeat]=useState(null);
  const fmtD=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const [selDay,setSelDay]=useState(()=>{const d=new Date();d.setDate(d.getDate()-1);return fmtD(d);});
  /* 月次ナビ: データがある最新月を初期値にする */
  const [selMonth,setSelMonth]=useState(()=>{
    const now=new Date();
    return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  });

  /* 重複除去済みテーブルデータ（全計算で共通使用） */
  const uniqueTables=useMemo(()=>{
    const seen=new Set();
    return (data.tables||[]).filter(t=>{
      const key=`${t.date}|${t.seat||''}|${(t.time||'').slice(0,5)}`;
      if(seen.has(key))return false;
      seen.add(key);return true;
    });
  },[data.tables]);

  /* Zレポートのない日のテーブルデータから「仮の日次レコード」を生成 */
  const tableDays=useMemo(()=>{
    const zDates=new Set((data.days||[]).map(d=>d.date));
    const map={};
    uniqueTables.forEach(t=>{
      if(zDates.has(t.date))return; /* Zレポートがある日はスキップ */
      if(!map[t.date])map[t.date]=[];
      map[t.date].push(t);
    });
    return Object.entries(map).map(([date,tables])=>{
      const totalSales=tables.reduce((s,t)=>s+(t.total||0),0);
      const drinkSales=tables.reduce((s,t)=>s+(t.drinkTotal||0),0);
      const covers=tables.reduce((s,t)=>s+(t.covers||0),0);
      return{date,totalSales,drinkSales,foodSales:totalSales-drinkSales,
        totalCovers:covers,tableCount:tables.length,
        drinkPerCover:covers>0?drinkSales/covers:0,
        drinkRatio:totalSales>0?drinkSales/totalSales:0,
        tableOnly:true}; /* テーブルデータのみフラグ */
    });
  },[data.tables,data.days]);

  const days=useMemo(()=>[...(data.days||[]),...tableDays].sort((a,b)=>a.date.localeCompare(b.date)),[data.days,tableDays]);

  /* 週次範囲（weekOffset=0 → 直近7日, -1 → その前の7日, …） */
  const weekRange=useMemo(()=>{
    const now=new Date();
    const end=new Date(now.getFullYear(),now.getMonth(),now.getDate()+weekOffset*7);
    const start=new Date(end.getFullYear(),end.getMonth(),end.getDate()-6);
    return{start:fmtD(start),end:fmtD(end)};
  },[weekOffset]);

  const filtered=useMemo(()=>{
    const now=new Date();
    const fmtL=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const w7=fmtL(new Date(now.getFullYear(),now.getMonth(),now.getDate()-6));
    if(period==='daily'){return days.filter(d=>d.date===selDay);}
    if(period==='weekly'){return days.filter(d=>d.date>=weekRange.start&&d.date<=weekRange.end);}
    if(period==='monthly'){
      const curM=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
      const zDays=data.days||[];
      /* テーブルのみの日は除外してZレポートベースで判定 */
      const hasCurrentMonth=zDays.some(d=>d.date.startsWith(curM));
      const targetM=(!hasCurrentMonth&&selMonth===curM&&zDays.length>0)
        ?[...zDays].sort((a,b)=>b.date.localeCompare(a.date))[0].date.slice(0,7)
        :selMonth;
      return days.filter(d=>d.date.startsWith(targetM));
    }
    if(period==='custom'||period==='ld'||period==='seat'){if(rs&&re)return days.filter(d=>d.date>=rs&&d.date<=re);return days.filter(d=>d.date>=w7);}
    return days;
  },[days,period,rs,re,selDay,weekRange]);

  const dowData=useMemo(()=>{
    const map={};
    DAYS.forEach(d=>{map[d]={dow:d,total:0,count:0}});
    days.forEach(d=>{const dow=getDOW(d.date);map[dow].total+=(d.drinkPerCover||0);map[dow].count++;});
    return DAYS.map(d=>({dow:d,avg:map[d].count>0?map[d].total/map[d].count:0,count:map[d].count}));
  },[days]);

  /* テーブルレコードを日付でインデックス化（重複除去済み） */
  const tablesByDate=useMemo(()=>{
    const map={};
    uniqueTables.forEach(t=>{if(!map[t.date])map[t.date]=[];map[t.date].push(t);});
    return map;
  },[uniqueTables]);

  const getDrinkCount=date=>{
    // テーブルレシートから集計（drinks配列 or drinkCount フィールドどちらも対応）
    const ts=tablesByDate[date];
    if(ts&&ts.length){
      const dc=ts.reduce((s,t)=>s+((t.drinks||[]).length>0?(t.drinks||[]).reduce((ss,d)=>ss+(d.qty||0),0):(t.drinkCount||0)),0);
      if(dc>0)return dc;
    }
    // テーブルデータがない場合はZレポートのdrinkCountを使う
    const day=(data.days||[]).find(d=>d.date===date);
    return(day?.drinkCount>0)?day.drinkCount:null;
  };

  const summary=useMemo(()=>{
    if(!filtered.length)return null;
    const tS=filtered.reduce((s,d)=>s+(d.totalSales||0),0);
    const tD=filtered.reduce((s,d)=>s+(d.drinkSales||0),0);
    const tC=filtered.reduce((s,d)=>s+(d.totalCovers||0),0);
    /* 杯数（テーブルデータ or Zレポートの drinkCount がある日を集計） */
    const datesWithDC=filtered.filter(d=>getDrinkCount(d.date)!==null);
    const totalDC=datesWithDC.length?datesWithDC.reduce((s,d)=>s+(getDrinkCount(d.date)||0),0):null;
    const coversWithDC=datesWithDC.reduce((s,d)=>s+(d.totalCovers||0),0);
    /* net換算（税抜・サービス料抜き） */
    const nS=net(tS),nD=net(tD);
    /* FL管理: 人件費・食材費（入力済み日のみ集計） */
    const tL=filtered.reduce((s,d)=>s+(d.laborCost||0),0);
    const tF=filtered.reduce((s,d)=>s+(d.foodCost||0),0);
    const flDays=filtered.filter(d=>d.laborCost||d.foodCost).length;
    return{days:filtered.length,totalSales:nS,totalDrink:nD,totalCovers:tC,
      drinkPerCover:tC>0?nD/tC:0,drinkRatio:tS>0?tD/tS:0,avgDaily:nD/filtered.length,
      totalDC,drinksPerCover:coversWithDC>0&&totalDC!==null?totalDC/coversWithDC:null,
      avgDrinkPrice:totalDC&&totalDC>0?Math.round(nD/totalDC):null,
      totalLabor:tL,totalFoodCost:tF,flDays};
  },[filtered,tablesByDate,data.days]);

  /* L/D 集計（フィルタ済み期間のテーブルデータから） */
  const ldFiltered=useMemo(()=>{
    if(!filtered.length)return null;
    const dates=new Set(filtered.map(d=>d.date));
    const tables=uniqueTables.filter(t=>dates.has(t.date));
    const isLunch=t=>(t.time||'00:00')>='10:00'&&(t.time||'00:00')<'17:00';
    const tDC=t=>(t.drinks||[]).length>0?(t.drinks||[]).reduce((ss,d)=>ss+(d.qty||0),0):(t.drinkCount||0);
    const agg=arr=>({
      dc:arr.reduce((s,t)=>s+tDC(t),0),
      covers:arr.reduce((s,t)=>s+(t.covers||0),0),
      drinkSales:arr.reduce((s,t)=>s+(t.drinkTotal||0),0),
    });
    if(tables.length){
      const l=agg(tables.filter(isLunch));
      const di=agg(tables.filter(t=>!isLunch(t)));
      const total=l.dc+di.dc;
      if(total>0){
        l.drinkPerCover=l.covers>0?l.drinkSales/l.covers:0;
        di.drinkPerCover=di.covers>0?di.drinkSales/di.covers:0;
        return{lunch:l,dinner:di,total,source:'table'};
      }
    }
    /* Zレポートにランチ/ディナー別データがある場合 */
    const lC=filtered.reduce((s,d)=>s+(d.lunchCovers||0),0);
    const dC=filtered.reduce((s,d)=>s+(d.dinnerCovers||0),0);
    const lD=filtered.reduce((s,d)=>s+(d.lunchDrinkSales||0),0);
    const dD=filtered.reduce((s,d)=>s+(d.dinnerDrinkSales||0),0);
    if(lC>0||dC>0){
      return{
        lunch:{covers:lC,drinkSales:lD,drinkPerCover:lC>0?lD/lC:0,dc:0},
        dinner:{covers:dC,drinkSales:dD,drinkPerCover:dC>0?dD/dC:0,dc:0},
        total:0,source:'z'
      };
    }
    return null;
  },[filtered,data.tables]);

  /* ld/seat タブ用の日付範囲（Zレポートに依存せずテーブルデータを直接フィルタ） */
  const ldSeatRange=useMemo(()=>{
    const now=new Date();
    const fmtL=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const w7=fmtL(new Date(now.getFullYear(),now.getMonth(),now.getDate()-6));
    const todayStr=fmtL(now);
    if(rs&&re)return{start:rs,end:re};
    return{start:w7,end:todayStr};
  },[rs,re]);

  /* 席別集計（テーブルデータを日付範囲で直接フィルタ） */
  const seatData=useMemo(()=>{
    const tables=uniqueTables.filter(t=>t.seat&&t.date>=ldSeatRange.start&&t.date<=ldSeatRange.end);
    if(!tables.length)return null;
    const map={};
    tables.forEach(t=>{
      const s=t.seat;
      if(!map[s])map[s]={seat:s,tableCount:0,covers:0,drinkSales:0,totalSales:0,dc:0,records:[]};
      map[s].tableCount++;
      map[s].covers+=(t.covers||0);
      map[s].drinkSales+=(t.drinkTotal||0);
      map[s].totalSales+=(t.total||0);
      map[s].dc+=(t.drinks||[]).length>0?(t.drinks||[]).reduce((ss,d)=>ss+(d.qty||0),0):(t.drinkCount||0);
      map[s].records.push(t);
    });
    return Object.values(map).map(s=>({...s,
      records:s.records.sort((a,b)=>b.date.localeCompare(a.date)||(b.time||'').localeCompare(a.time||'')),
      drinkPerCover:s.covers>0?s.drinkSales/s.covers:0,
      drinksPerCover:s.dc>0&&s.covers>0?s.dc/s.covers:null,
      drinkRatio:s.totalSales>0?s.drinkSales/s.totalSales:0
    })).sort((a,b)=>b.drinkPerCover-a.drinkPerCover);/* 1人あたりD売上降順 */
  },[ldSeatRange,data.tables]);

  /* L/D 集計（テーブルデータを日付範囲で直接フィルタ・重複除去済み） */
  const ldData=useMemo(()=>{
    const tables=uniqueTables.filter(t=>t.date>=ldSeatRange.start&&t.date<=ldSeatRange.end);
    /* Zレポートの同期間の総客数（カバレッジ計算用） */
    const zCovers=(rs&&re?days.filter(d=>d.date>=ldSeatRange.start&&d.date<=ldSeatRange.end):days.filter(d=>d.date>=ldSeatRange.start&&d.date<=ldSeatRange.end))
      .reduce((s,d)=>s+(d.totalCovers||0),0);
    if(!tables.length)return null;
    const isLunch=t=>(t.time||'00:00')>='10:00'&&(t.time||'00:00')<'17:00';
    const agg=arr=>{
      const covers=arr.reduce((s,t)=>s+(t.covers||0),0);
      const drinkSales=arr.reduce((s,t)=>s+(t.drinkTotal||0),0);
      const totalSales=arr.reduce((s,t)=>s+(t.total||0),0);
      const dc=arr.reduce((s,t)=>s+((t.drinks||[]).length>0?(t.drinks||[]).reduce((ss,d)=>ss+(d.qty||0),0):(t.drinkCount||0)),0);
      return{tableCount:arr.length,covers,drinkSales,totalSales,dc,
        drinkPerCover:covers>0?drinkSales/covers:0,
        drinksPerCover:covers>0?dc/covers:0,
        drinkRatio:totalSales>0?drinkSales/totalSales:0};
    };
    const lunch=agg(tables.filter(isLunch));
    const dinner=agg(tables.filter(t=>!isLunch(t)));
    const scannedCovers=lunch.covers+dinner.covers;
    const coveragePct=zCovers>0?Math.round(scannedCovers/zCovers*100):null;
    return{lunch,dinner,scannedCovers,zCovers,coveragePct};
  },[ldSeatRange,uniqueTables,days,rs,re]);

  if(!days.length)return React.createElement('div',{className:'empty'},
    React.createElement('i',{className:'ti ti-chart-bar-off'}),'まだデータがありません',
    React.createElement('div',{style:{fontSize:12,marginTop:4}},'日次締めを完了するとレポートが表示されます')
  );

  const isLD=period==='ld';
  const isSeat=period==='seat';
  const chartData=period==='dow'
    ?dowData.map(d=>({name:d.dow,value:net(Math.round(d.avg))}))
    :isLD
      ?ldData?[{name:'ランチ',value:net(Math.round(ldData.lunch.drinkPerCover))},{name:'ディナー',value:net(Math.round(ldData.dinner.drinkPerCover))}]:[]
      :isSeat
        ?seatData?seatData.map(s=>({name:s.seat,value:net(s.drinkPerCover)})):[]
        :filtered.map(d=>({name:weekLabel(d.date),value:net(d.drinkPerCover||0)}));

  const LDCard=({session,label,color,icon})=>React.createElement('div',{className:'card'},
    React.createElement('div',{style:{fontSize:14,fontWeight:700,color,marginBottom:12,display:'flex',alignItems:'center',gap:6,borderBottom:'2px solid currentColor',paddingBottom:8}},
      React.createElement('i',{className:`ti ti-${icon}`}),label,
      React.createElement('span',{style:{marginLeft:'auto',fontSize:12,fontWeight:400,color:'var(--text2)'}},`${session.tableCount}組 / ${session.covers}名`)
    ),
    React.createElement('div',{style:{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10}},
      [{l:'ドリンク売上（税抜）',v:`¥${fmt(net(session.drinkSales))}`,c:'var(--blue)'},{l:'1人D売上（税抜）',v:`¥${fmt(net(session.drinkPerCover),0)}`,c:'var(--blue)'},{l:'DR比率',v:`${fmt(session.drinkRatio*100,1)}%`,c:session.drinkRatio>=0.3?'var(--green)':'var(--amber)'},{l:'1人D杯数',v:`${fmt(session.drinksPerCover,1)}杯`,c:'var(--blue)'},{l:'総ドリンク数',v:`${Math.round(session.dc||0)}杯`},{l:'組あたり売上',v:`¥${fmt(net(session.tableCount>0?session.drinkSales/session.tableCount:0))}`}]
      .map(({l,v,c})=>React.createElement('div',{key:l,className:'metric-card'},
        React.createElement('div',{className:'metric-val',style:{fontSize:16,...(c?{color:c}:{})}},v),
        React.createElement('div',{className:'metric-lbl'},l)
      ))
    )
  );

  return React.createElement('div',null,
    /* 期間セレクタ */
    React.createElement('div',{style:{marginBottom:12}},
      React.createElement('div',{className:'seg-ctrl'},
        [{v:'daily',l:'日次'},{v:'weekly',l:'週次'},{v:'monthly',l:'月次'},{v:'dow',l:'曜日別'},{v:'ld',l:'L/D別'},{v:'seat',l:'席別'},{v:'custom',l:'期間'},{v:'compare',l:'照合'}].map(({v,l})=>
          React.createElement('button',{key:v,className:`seg-btn${period===v?' active':''}`,onClick:()=>setPeriod(v)},l)
        )
      ),
      period==='daily'&&React.createElement('div',{style:{display:'flex',gap:6,alignItems:'center',marginTop:8}},
        React.createElement('button',{onClick:()=>{const[y,m,d]=selDay.split('-').map(Number);setSelDay(fmtD(new Date(y,m-1,d-1)));},style:{padding:'6px 10px',flexShrink:0}},
          React.createElement('i',{className:'ti ti-chevron-left'})
        ),
        React.createElement('input',{type:'date',value:selDay,max:today(),onChange:e=>setSelDay(e.target.value),style:{flex:1,textAlign:'center'}}),
        React.createElement('button',{onClick:()=>{const[y,m,d]=selDay.split('-').map(Number);const nd=fmtD(new Date(y,m-1,d+1));if(nd<=today())setSelDay(nd);},disabled:selDay>=today(),style:{padding:'6px 10px',flexShrink:0}},
          React.createElement('i',{className:'ti ti-chevron-right'})
        )
      ),
      period==='weekly'&&React.createElement('div',{style:{display:'flex',gap:6,alignItems:'center',marginTop:8}},
        React.createElement('button',{onClick:()=>setWeekOffset(o=>o-1),style:{padding:'6px 10px',flexShrink:0}},
          React.createElement('i',{className:'ti ti-chevron-left'})
        ),
        React.createElement('div',{style:{flex:1,textAlign:'center',fontSize:13,fontWeight:600,color:'var(--text1)'}},
          `${weekRange.start} 〜 ${weekRange.end}`,
          weekOffset===0&&React.createElement('span',{style:{fontSize:11,color:'var(--text3)',marginLeft:6}},'(直近7日)')
        ),
        React.createElement('button',{onClick:()=>setWeekOffset(o=>o+1),disabled:weekOffset>=0,style:{padding:'6px 10px',flexShrink:0}},
          React.createElement('i',{className:'ti ti-chevron-right'})
        )
      ),
      period==='monthly'&&React.createElement('div',{style:{display:'flex',gap:6,alignItems:'center',marginTop:8}},(()=>{

          )),

/* ── Master Settings ── */
function MasterSettings({apiKey,config,setConfig}){
  const [master,setMasterState]=useState(loadMaster);
  const [candidates,setCandidates]=useState([]);   // AI分類用 [{name,isDrink}]
  const [structured,setStructured]=useState(null); // 構造化CSV用 {drinks,totalQty,totalAmt}
  const [phase,setPhase]=useState('list'); // 'list'|'loading'|'confirm'|'confirm-structured'
  const [err,setErr]=useState('');
  const [newName,setNewName]=useState('');
  const [newSeat,setNewSeat]=useState('');
  const [fileName,setFileName]=useState('');

  const persist=m=>{saveMaster(m);setMasterState(m)};
  const removeDrink=name=>persist({...master,drinks:master.drinks.filter(d=>d!==name)});
  const removeExclude=name=>persist({...master,excludes:(master.excludes||[]).filter(d=>d!==name)});
  const addManual=()=>{
    const n=newName.trim();
    if(!n||master.drinks.includes(n))return;
    persist({...master,drinks:[...master.drinks,n]});
    setNewName('');
  };

  /* ── 構造化CSV（カテゴリ1列あり）パース ── */
  const parseStructuredCSV=text=>{
    const sep=text.includes('\t')?'\t':',';
    const rows=text.trim().split(/\r?\n/).map(l=>l.split(sep).map(c=>c.replace(/^"|"$/g,'').trim()));
    const hdr=rows[0];
    const nameIdx=hdr.findIndex(h=>h==='商品名');
    const cat1Idx=hdr.findIndex(h=>h==='カテゴリ1');
    const cat2Idx=hdr.findIndex(h=>h==='カテゴリ2');
    const qtyIdx =hdr.findIndex(h=>h==='売上数量');
    const amtIdx =hdr.findIndex(h=>h==='売上金額');
    if(cat1Idx<0||nameIdx<0)return null;
    const pn=s=>parseInt((s||'').replace(/[¥,\s]/g,'')||'0')||0;
    const drinks=rows.slice(1)
      .filter(r=>r[cat1Idx]==='ドリンク'&&r[nameIdx])
      .map(r=>({name:r[nameIdx],cat2:cat2Idx>=0?r[cat2Idx]:'',qty:qtyIdx>=0?pn(r[qtyIdx]):0,amt:amtIdx>=0?pn(r[amtIdx]):0}));
    const excludes=[...new Set(rows.slice(1)
      .filter(r=>r[nameIdx]&&(r[cat1Idx]==='コース'||r[cat1Idx]==='フード'))
      .map(r=>r[nameIdx]))];
    return{drinks,excludes,totalQty:drinks.reduce((s,d)=>s+d.qty,0),totalAmt:drinks.reduce((s,d)=>s+d.amt,0)};
  };

  /* ── 非構造化CSV → 品名抽出（AI分類用） ── */
  const parseNames=text=>{
    const sep=text.includes('\t')?'\t':',';
    const lines=text.split(/\r?\n/).filter(l=>l.trim());
    if(!lines.length)return[];
    const rows=lines.map(l=>l.split(sep).map(c=>c.replace(/^"|"$/g,'').trim()));
    const hdr=rows[0];
    let col=hdr.findIndex(h=>/商品名|品名|name/i.test(h));
    if(col<0){const sc=hdr.map((_,i)=>rows.slice(1).filter(r=>r[i]&&isNaN(r[i])&&r[i].length>1).length);col=sc.indexOf(Math.max(...sc));}
    return[...new Set(rows.slice(1).map(r=>r[col]).filter(v=>v&&v.length>1))];
  };

  const handleFile=async f=>{
    setErr('');setFileName(f.name||'');setPhase('loading');
    try{
      if(f.name.toLowerCase().endsWith('.csv')||f.type==='text/csv'||f.type==='text/plain'){
        // BOM検出でエンコーディング判定
        const ab=await f.arrayBuffer();
        const bom=new Uint8Array(ab.slice(0,2));
        const enc=(bom[0]===0xFF&&bom[1]===0xFE)||(bom[0]===0xFE&&bom[1]===0xFF)?'utf-16':'utf-8';
        const text=new TextDecoder(enc).decode(ab);
        // 構造化CSV（カテゴリ1列あり）→ AIなしで自動判定
        const result=parseStructuredCSV(text);
        if(result&&result.drinks.length){setStructured(result);setPhase('confirm-structured');return;}
        // 非構造化 → AI分類
        const names=parseNames(text);
        if(!names.length)throw new Error('商品名の列が見つかりませんでした');
        if(!apiKey)throw new Error('APIキーを設定してください');
        const res=await callVision(apiKey,null,null,
`以下はレストランの商品名リストです。各商品がドリンク（飲み物）かフード（料理・コース）かを判定してください。JSONのみで返答：
{"items":[{"name":"商品名","isDrink":true},{"name":"料理名","isDrink":false}]}
商品リスト：\n${names.join('\n')}`
        );
        const parsed=JSON.parse(res.replace(/```json|```/g,'').trim());
        setCandidates(parsed.items||[]);setPhase('confirm');
      } else if(f.type==='application/pdf'){
        const b64=await toB64(f);
        const res=await callVision(apiKey,b64,'application/pdf',
`この商品マスター・価格表PDFから全商品名を抽出し、各商品がドリンク（飲み物）かフード（料理・コース）かを判定してください。JSONのみで返答：
{"items":[{"name":"商品名","isDrink":true},{"name":"料理名","isDrink":false}]}
ドリンク＝アルコール・ソフトドリンク・お茶・水など飲み物全般。フード＝料理・コース・食事。`
        );
        const parsed=JSON.parse(res.replace(/```json|```/g,'').trim());
        setCandidates(parsed.items||[]);setPhase('confirm');
      }
    }catch(e){setErr(e.message);setPhase('list');}
  };

  const toggleCandidate=name=>setCandidates(prev=>prev.map(c=>c.name===name?{...c,isDrink:!c.isDrink}:c));
  const confirmCandidates=()=>{
    const newDrinks=[...new Set([...master.drinks,...candidates.filter(c=>c.isDrink).map(c=>c.name)])];
    const newExcludes=[...new Set([...master.excludes,...candidates.filter(c=>!c.isDrink).map(c=>c.name)])];
    persist({...master,drinks:newDrinks,excludes:newExcludes});setCandidates([]);setPhase('list');setFileName('');
  };
  const confirmStructured=()=>{
    const newDrinks=[...new Set([...master.drinks,...structured.drinks.map(d=>d.name)])];
    const newExcludes=[...new Set([...master.excludes,...(structured.excludes||[])])];
    persist({...master,drinks:newDrinks,excludes:newExcludes});setStructured(null);setPhase('list');setFileName('');
  };

  /* ── 構造化CSV確認画面 ── */
  if(phase==='confirm-structured'&&structured){
    const byCat2={};
    structured.drinks.forEach(d=>{
      if(!byCat2[d.cat2])byCat2[d.cat2]={count:0,qty:0,amt:0};
      byCat2[d.cat2].count++;byCat2[d.cat2].qty+=d.qty;byCat2[d.cat2].amt+=d.amt;
    });
    return React.createElement('div',null,
      React.createElement('div',{className:'card'},
        React.createElement('div',{style:{fontSize:13,fontWeight:600,marginBottom:2,color:'var(--green)',display:'flex',alignItems:'center',gap:5}},
          React.createElement('i',{className:'ti ti-check-circle'}),'カテゴリ列から自動判定しました（AI不要）'
        ),
        React.createElement('div',{style:{fontSize:11,color:'var(--text2)',marginBottom:12}},fileName),
        React.createElement('table',null,
          React.createElement('thead',null,React.createElement('tr',null,
            ['カテゴリ','品数','杯数','売上金額'].map(h=>React.createElement('th',{key:h},h))
          )),
          React.createElement('tbody',null,
            Object.entries(byCat2).map(([cat,v])=>React.createElement('tr',{key:cat},
              React.createElement('td',null,cat||'（未分類）'),
              React.createElement('td',null,`${v.count}品`),
              React.createElement('td',null,v.qty>0?`${v.qty.toLocaleString()}杯`:'-'),
              React.createElement('td',null,v.amt>0?`¥${v.amt.toLocaleString()}`:'-')
            ))
          )
        ),
        React.createElement('div',{style:{marginTop:10,padding:'10px 12px',background:'var(--surface2)',borderRadius:'var(--r)',fontSize:12,display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:6}},
          React.createElement('span',{style:{fontWeight:600}},`ドリンク ${structured.drinks.length}品 / 除外（コース・フード）${(structured.excludes||[]).length}品`),
          structured.totalQty>0&&React.createElement('span',{style:{color:'var(--blue)',fontWeight:600}},
            `${structured.totalQty.toLocaleString()}杯 / ¥${structured.totalAmt.toLocaleString()}`)
        ),
        React.createElement('div',{style:{display:'flex',gap:8,marginTop:12}},
          React.createElement('button',{onClick:()=>{setStructured(null);setPhase('list')},style:{flex:1}},'← やり直し'),
          React.createElement('button',{onClick:confirmStructured,
            style:{flex:2,background:'var(--blue)',color:'#fff',border:'none',fontWeight:600,justifyContent:'center',padding:'10px',borderRadius:'var(--r)',display:'flex',alignItems:'center',gap:5,cursor:'pointer'}},
            React.createElement('i',{className:'ti ti-device-floppy'}),` ${structured.drinks.length}品をマスターに保存`)
        )
      )
    );
  }

  /* ── AI分類確認画面 ── */
  if(phase==='confirm') return React.createElement('div',null,
    React.createElement('div',{className:'card',style:{marginBottom:10}},
      React.createElement('div',{style:{fontSize:13,fontWeight:600,marginBottom:4}},
        React.createElement('i',{className:'ti ti-check-list',style:{marginRight:5}}),'AI分類結果を確認'
      ),
      React.createElement('div',{style:{fontSize:11,color:'var(--text2)',marginBottom:12}},`${fileName} — タップで反転できます`),
      React.createElement('div',{style:{display:'flex',flexWrap:'wrap',gap:6,marginBottom:14}},
        candidates.map(c=>React.createElement('button',{
          key:c.name,onClick:()=>toggleCandidate(c.name),
          style:{padding:'5px 10px',fontSize:12,borderRadius:20,
            background:c.isDrink?'#dbeafe':'var(--surface2)',
            color:c.isDrink?'var(--blue)':'var(--text3)',
            border:`1.5px solid ${c.isDrink?'var(--blue)':'var(--border2)'}`,
            fontWeight:c.isDrink?600:400}
        },c.isDrink?'🍺 ':'🍽 ',c.name))
      ),
      React.createElement('div',{style:{fontSize:11,color:'var(--text2)',marginBottom:10}},
        `青＝ドリンク（${candidates.filter(c=>c.isDrink).length}品）　グレー＝フード（${candidates.filter(c=>!c.isDrink).length}品）`
      ),
      React.createElement('div',{style:{display:'flex',gap:8}},
        React.createElement('button',{onClick:()=>{setCandidates([]);setPhase('list')},style:{flex:1}},'← やり直し'),
        React.createElement('button',{onClick:confirmCandidates,
          style:{flex:2,background:'var(--blue)',color:'#fff',border:'none',fontWeight:600,justifyContent:'center',padding:'10px',borderRadius:'var(--r)',display:'flex',alignItems:'center',gap:5,cursor:'pointer'}},
          React.createElement('i',{className:'ti ti-device-floppy'}),' マスターに保存')
      )
    )
  );

  return React.createElement('div',null,
    /* アップロード */
    React.createElement('div',{className:'card',style:{marginBottom:10}},
      React.createElement('div',{style:{fontSize:13,fontWeight:600,marginBottom:4}},
        React.createElement('i',{className:'ti ti-database-import',style:{marginRight:5}}),'商品マスターをインポート'
      ),
      React.createElement('div',{style:{fontSize:11,color:'var(--text2)',marginBottom:10}},'カテゴリ列があるPOS CSVはAI不要で自動判定。PDFはAIで判定します。'),
      phase==='loading'
        ?React.createElement('div',{style:{textAlign:'center',padding:20,color:'var(--text2)'}},
            React.createElement('i',{className:'ti ti-loader spin',style:{fontSize:24}}),
            React.createElement('div',{style:{marginTop:8,fontSize:12}},'読み込み中...')
          )
        :React.createElement(UploadZone,{
            onFile:handleFile,
            accept:'image/*,.pdf,.csv,text/csv,text/plain',
            label:'商品マスターCSV / PDF を選択',
            hint:'POSからエクスポートした商品一覧ファイル'
          }),
      err&&React.createElement('div',{style:{color:'var(--red)',fontSize:12,padding:'8px 10px',background:'#fee2e2',borderRadius:'var(--r)',marginTop:8}},err)
    ),
    /* 席マスター */
    React.createElement('div',{className:'card',style:{marginBottom:10}},
      React.createElement('div',{style:{fontSize:13,fontWeight:600,marginBottom:4,display:'flex',alignItems:'center',gap:5}},
        React.createElement('i',{className:'ti ti-armchair',style:{color:'var(--green)'}}),
        '席マスター（テーブル・個室・カウンター）'
      ),
      React.createElement('div',{style:{fontSize:11,color:'var(--text2)',marginBottom:10}},'登録した席名はレシート解析時にAIが照合します。表示名のまま入力してください。'),
      (()=>{
        const seatTrimmed=newSeat.trim();
        const isDup=seatTrimmed&&(master.seats||[]).includes(seatTrimmed);
        const canAdd=seatTrimmed&&!isDup;
        const doAdd=()=>{if(!canAdd)return;persist({...master,seats:[...(master.seats||[]),seatTrimmed]});setNewSeat('');};
        return React.createElement('div',null,
          React.createElement('div',{style:{display:'flex',gap:6,marginBottom:4}},
            React.createElement('input',{type:'text',value:newSeat,onChange:e=>setNewSeat(e.target.value),
              onKeyDown:e=>e.key==='Enter'&&doAdd(),
              placeholder:'例）テーブル1、個室A、カウンター左',
              style:{flex:1,borderColor:isDup?'var(--red)':''}
            }),
            React.createElement('button',{onClick:doAdd,disabled:!canAdd,
              style:{flexShrink:0,background:'var(--green)',color:'#fff',border:'none',padding:'8px 14px',borderRadius:'var(--r)',cursor:canAdd?'pointer':'not-allowed',opacity:canAdd?1:0.4}},
              React.createElement('i',{className:'ti ti-plus'})
            )
          ),
          isDup&&React.createElement('div',{style:{fontSize:11,color:'var(--red)',marginBottom:6}},`「${seatTrimmed}」はすでに登録されています`)
        );
      })(),
      (master.seats||[]).length===0
        ?React.createElement('div',{style:{fontSize:12,color:'var(--text3)',textAlign:'center',padding:'10px 0'}},'まだ登録されていません')
        :React.createElement('div',{style:{display:'flex',flexWrap:'wrap',gap:6}},
            (master.seats||[]).map(s=>React.createElement('div',{key:s,
              style:{display:'flex',alignItems:'center',gap:4,padding:'4px 10px',background:'#f0fdf4',border:'1px solid #86efac',borderRadius:20,fontSize:12,color:'var(--green)'}},
              React.createElement('i',{className:'ti ti-armchair'}),
              React.createElement('span',null,s),
              React.createElement('button',{onClick:()=>persist({...master,seats:(master.seats||[]).filter(s2=>s2!==s)}),
                style:{padding:0,border:'none',background:'none',color:'var(--green)',cursor:'pointer',lineHeight:1,fontSize:13,display:'flex'}},
                React.createElement('i',{className:'ti ti-x'})
              )
            ))
          )
    ),
    /* 手動追加 */
    React.createElement('div',{className:'card',style:{marginBottom:10}},
      React.createElement('div',{style:{fontSize:13,fontWeight:600,marginBottom:10}},
        React.createElement('i',{className:'ti ti-circle-plus',style:{marginRight:5}}),'ドリンク品名を手動追加'
      ),
      React.createElement('div',{style:{display:'flex',gap:6}},
        React.createElement('input',{type:'text',value:newName,onChange:e=>setNewName(e.target.value),
          onKeyDown:e=>e.key==='Enter'&&addManual(),
          placeholder:'例）W/ミネラルウォーター',style:{flex:1}}),
        React.createElement('button',{onClick:addManual,disabled:!newName.trim(),
          style:{flexShrink:0,background:'var(--blue)',color:'#fff',border:'none',padding:'8px 14px',borderRadius:'var(--r)',cursor:'pointer'}},
          React.createElement('i',{className:'ti ti-plus'})
        )
      )
    ),
    /* 現在のリスト */
    React.createElement('div',{className:'card',style:{marginBottom:10}},
      React.createElement('div',{style:{fontSize:13,fontWeight:600,marginBottom:10}},
        React.createElement('i',{className:'ti ti-list-check',style:{marginRight:5}}),
        `登録済みドリンク品名（${master.drinks.length}品）`

      master.drinks.length===0
        ?React.createElement('div',{style:{fontSize:12,color:'var(--text3)',textAlign:'center',padding:'12px 0'}},'まだ登録されていません')
        :React.createElement('div',{style:{display:'flex',flexWrap:'wrap',gap:6}},
            master.drinks.map(d=>React.createElement('div',{key:d,
              style:{display:'flex',alignItems:'center',gap:4,padding:'4px 10px',background:'#dbeafe',border:'1px solid #93c5fd',borderRadius:20,fontSize:12,color:'var(--blue)'}},
              React.createElement('span',null,d),

                React.createElement('i',{className:'ti ti-x'})
              )
            ))

    ),

      React.createElement('div',{style:{fontSize:13,fontWeight:600,marginBottom:6,display:'flex',alignItems:'center',gap:6}},

      ),
      (master.excludes||[]).length===0
        ?React.createElement('div',{style:{fontSize:12,color:'var(--text3)',textAlign:'center',padding:'12px 0'}},'まだ登録されていません')
        :React.createElement('div',{style:{display:'flex',flexWrap:'wrap',gap:6}},
            (master.excludes||[]).map(d=>React.createElement('div',{key:d,
              style:{display:'flex',alignItems:'center',gap:4,padding:'4px 10px',background:'#fee2e2',border:'1px solid #fca5a5',borderRadius:20,fontSize:12,color:'var(--red)'}},
