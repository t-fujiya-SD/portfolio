<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>開店・閉店チェックリスト｜デモ</title>
<style>
:root{--navy:#1c3a5e;--navy2:#27496d;--gold:#c9a84a;--ink:#1f2733;--sub:#5b6675;--bg:#f4f6f8;--card:#fff;--border:#e3e9f0;--green:#16a34a;--amber:#d97706;--red:#dc2626;--blue:#2563eb;--sb:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",Meiryo,sans-serif;color:var(--ink);background:var(--bg);line-height:1.6;-webkit-font-smoothing:antialiased;padding-bottom:calc(80px + var(--sb))}
.wrap{max-width:640px;margin:0 auto;padding:0 16px}
header{background:linear-gradient(120deg,var(--navy),var(--navy2));color:#fff;padding:13px 0;position:sticky;top:0;z-index:50}
.hd{display:flex;align-items:center;gap:8px}
.hd h1{font-size:15px;font-weight:800;flex:1}
.badge{font-size:10px;font-weight:700;background:var(--gold);color:#1c2a3a;padding:2px 8px;border-radius:20px;flex:none}
.shift-tabs{display:flex;background:#fff;border-bottom:2px solid var(--border);position:sticky;top:49px;z-index:40}
.st{flex:1;padding:11px 4px;font-size:14px;font-weight:700;border:none;background:none;cursor:pointer;color:var(--sub);border-bottom:3px solid transparent;margin-bottom:-2px;transition:color .12s,border-color .12s}
.st.on{color:var(--navy);border-bottom-color:var(--navy)}
.demo-note{background:var(--card);border-left:4px solid var(--gold);border-radius:10px;padding:10px 14px;margin:12px 0 0;font-size:12.5px;color:#3a4658}
/* carry-over */
.co-banner{background:#fffbeb;border:1px solid #fde68a;border-left:4px solid var(--amber);border-radius:10px;padding:12px 14px;margin:12px 0 0}
.co-title{font-size:13px;font-weight:800;color:#92400e;margin-bottom:6px}
.co-row{font-size:12.5px;color:#78350f;margin-bottom:3px;display:flex;gap:6px}
.co-lbl{font-weight:700;flex:none}
/* staff name */
.staff-fld{display:flex;align-items:center;gap:10px;padding:11px 14px}
.staff-fld label{font-size:13px;font-weight:800;color:var(--navy);flex:none}
.staff-fld input{flex:1;border:1px solid var(--border);border-radius:9px;padding:9px 11px;font-size:14px;font-family:inherit;outline:none}
.staff-fld input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
/* category */
.cat{background:var(--card);border:1px solid var(--border);border-radius:14px;margin:12px 0;overflow:hidden}
.cat-head{display:flex;align-items:center;gap:7px;padding:11px 14px;background:#f8fafc;border-bottom:1px solid var(--border)}
.cat-icon{font-size:16px}
.cat-title{font-size:13.5px;font-weight:800;color:var(--navy);flex:1}
.cat-prog{font-size:12px;font-weight:700;color:var(--sub)}
.edit-btn{background:none;border:1px solid var(--border);border-radius:7px;padding:3px 9px;font-size:11px;font-weight:700;color:var(--sub);cursor:pointer;flex:none}
.edit-btn.on{background:var(--navy);color:#fff;border-color:var(--navy)}
/* items */
.item{display:flex;align-items:flex-start;border-bottom:1px solid var(--border)}
.item:last-child{border-bottom:none}
.item label{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;flex:1;cursor:pointer;min-width:0;-webkit-tap-highlight-color:transparent}
.cb{width:22px;height:22px;border:2px solid var(--border);border-radius:6px;flex:none;display:flex;align-items:center;justify-content:center;transition:background .15s,border-color .15s;margin-top:1px}
.item.ck .cb{background:var(--green);border-color:var(--green)}
.item.ck .cb::after{content:"";display:block;width:6px;height:11px;border:2.5px solid #fff;border-top:none;border-left:none;transform:rotate(42deg) translateY(-2px)}
.item-text{font-size:14px;flex:1;line-height:1.4}
.item.ck .item-text{color:#94a3b8;text-decoration:line-through}
.ph-badge{font-size:11px;text-decoration:none;margin-left:2px}
.item-acts{display:flex;align-items:center;gap:4px;padding:9px 10px 0 0;flex:none}
.how-btn,.cam-btn{width:30px;height:30px;border:1.5px solid var(--border);border-radius:50%;background:#fff;cursor:pointer;font-size:14px;font-weight:800;color:var(--sub);display:flex;align-items:center;justify-content:center;line-height:1;padding:0}
.how-btn{color:var(--blue);border-color:#bfdbfe}
.how-btn:active,.cam-btn:active{background:#eef4ff}
.photo-thumb{display:flex;align-items:center;gap:10px;padding:0 14px 12px 46px}
.photo-thumb img{width:64px;height:64px;object-fit:cover;border-radius:8px;border:1px solid var(--border)}
.ph-acts{display:flex;flex-direction:column;gap:5px}
.ph-acts button{border:1px solid var(--border);background:#fff;border-radius:7px;padding:5px 10px;font-size:11.5px;font-weight:700;cursor:pointer;color:var(--sub)}
.ph-acts .ph-rm:hover{color:var(--red);border-color:#fecaca}
.qty-row{padding:2px 14px 11px 46px;display:flex;align-items:center;gap:6px}
.qty-inp{width:80px;border:1px solid var(--border);border-radius:8px;padding:6px 8px;font-size:14px;font-family:inherit;outline:none;text-align:right}
.qty-inp:focus,.edit-inp:focus,.unit-inp:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
.unit-sel,.unit-inp{border:1px solid var(--border);border-radius:8px;padding:6px 8px;font-size:13px;font-family:inherit;background:#fff;outline:none;width:70px}
/* temp */
.temp-row{display:flex;align-items:center;gap:8px;padding:11px 14px;border-bottom:1px solid var(--border)}
.temp-row:last-child{border-bottom:none}
.temp-lbl{font-size:14px;flex:1;display:flex;align-items:center;gap:6px}
.temp-wrap{display:flex;align-items:center;gap:5px}
.temp-inp{width:70px;border:1px solid var(--border);border-radius:8px;padding:7px 8px;font-size:14px;text-align:right;font-family:inherit;outline:none}
.temp-inp:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
.temp-u{font-size:12px;color:var(--sub);font-weight:600}
.temp-how{width:24px;height:24px;border:1.5px solid #bfdbfe;border-radius:50%;background:#fff;color:var(--blue);font-size:12px;font-weight:800;cursor:pointer;flex:none;line-height:1}
.tbadge{font-size:11px;font-weight:700;padding:2px 7px;border-radius:12px;white-space:nowrap}
.tok{background:#dcfce7;color:#166534}.tng{background:#fee2e2;color:#991b1b}
/* reservation */
.resv-body{padding:10px 14px;display:flex;flex-direction:column;gap:10px}
.resv-empty{font-size:12.5px;color:var(--sub);padding:6px 0}
.resv-card{position:relative;border:1px solid var(--border);border-radius:10px;padding:11px 34px 11px 11px;background:#fcfdfe}
.resv-grid{display:grid;grid-template-columns:1.4fr .8fr;gap:8px}
.resv-course{margin-top:8px}
.resv-course .resv-fld select{margin-bottom:7px}
.course-free{width:100%;border:1px solid var(--blue);border-radius:8px;padding:7px 9px;font-size:13.5px;font-family:inherit;outline:none}
.course-row{display:flex;align-items:center;gap:8px;border:1px solid var(--border);border-radius:9px;padding:7px 8px 7px 11px;margin-bottom:8px}
.course-row input{flex:1;border:none;font-size:14px;font-family:inherit;outline:none;background:none}
.course-row .crm{border:none;background:none;color:#cbd5e1;font-size:19px;cursor:pointer;line-height:1;padding:2px 4px;flex:none}
.course-row .crm:hover{color:var(--red)}
.resv-fld label{font-size:10.5px;font-weight:700;color:var(--sub);display:block;margin-bottom:3px}
.resv-fld input,.resv-fld select{width:100%;border:1px solid var(--border);border-radius:8px;padding:7px 9px;font-size:13.5px;font-family:inherit;outline:none;background:#fff}
.resv-fld input:focus,.resv-fld select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
.resv-del{position:absolute;top:6px;right:6px;border:none;background:none;color:#cbd5e1;font-size:19px;cursor:pointer;line-height:1;padding:4px}
.resv-del:hover{color:var(--red)}
/* handover */
.ho-body{padding:12px 14px;display:flex;flex-direction:column;gap:10px}
.ho-fld label{font-size:12px;font-weight:700;color:var(--sub);display:block;margin-bottom:4px}
.ho-fld input,.ho-fld textarea{width:100%;border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:14px;font-family:inherit;outline:none;resize:vertical}
.ho-fld textarea{min-height:60px}
.ho-fld input:focus,.ho-fld textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
/* edit mode */
.reorder{display:flex;flex-direction:column;gap:2px;padding:8px 2px 8px 8px;flex:none}
.reorder button{width:26px;height:20px;border:1px solid var(--border);background:#fff;border-radius:5px;font-size:9px;color:var(--sub);cursor:pointer;line-height:1;padding:0}
.reorder button:active{background:#eef4ff}
.del-btn{background:none;border:none;color:#cbd5e1;font-size:20px;padding:8px 12px 8px 4px;cursor:pointer;line-height:1;flex:none;align-self:center}
.del-btn:hover{color:var(--red)}
.man-edit-btn{background:none;border:1px solid var(--border);border-radius:7px;font-size:14px;padding:5px 8px;cursor:pointer;flex:none;align-self:center}
.edit-inp{flex:1;border:1px solid var(--blue);border-radius:7px;padding:7px 9px;font-size:14px;font-family:inherit;outline:none;min-width:0}
.add-form{display:flex;gap:6px;padding:10px 14px;border-top:1px dashed var(--border);align-items:center;flex-wrap:wrap}
.add-form .ai{flex:1;min-width:120px;border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:13.5px;font-family:inherit;outline:none}
.add-form .ai:focus{border-color:var(--blue)}
.add-form select{border:1px solid var(--border);border-radius:8px;padding:7px 8px;font-size:13px;font-family:inherit;background:#fff;outline:none}
.add-form .unit-ai{width:65px;border:1px solid var(--border);border-radius:8px;padding:8px 6px;font-size:13px;font-family:inherit;outline:none;text-align:center}
.add-form .unit-ai:focus{border-color:var(--blue)}
.addbtn{background:var(--navy);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap}
/* modal */
.modal-ov{position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:100;display:flex;align-items:flex-end;justify-content:center;padding:0}
.modal-box{background:#fff;width:100%;max-width:640px;border-radius:18px 18px 0 0;padding:18px 18px calc(20px + var(--sb));max-height:84vh;overflow:auto;animation:slideup .22s ease}
@keyframes slideup{from{transform:translateY(40px);opacity:.4}to{transform:translateY(0);opacity:1}}
.modal-h{display:flex;align-items:flex-start;gap:8px;margin-bottom:4px}
.modal-tag{font-size:11px;font-weight:800;color:var(--blue);background:#eff6ff;border-radius:20px;padding:3px 10px;flex:none}
.modal-title{font-size:16px;font-weight:800;color:var(--ink);flex:1;line-height:1.4}
.man-text{font-size:13.5px;line-height:1.75;color:#374151;white-space:pre-wrap;background:#f8fafc;border:1px solid var(--border);border-radius:10px;padding:13px 14px;margin:12px 0}
.man-empty{font-size:13px;color:var(--sub);background:#f8fafc;border:1px dashed var(--border);border-radius:10px;padding:16px 14px;margin:12px 0;text-align:center}
.modal-ta{width:100%;min-height:140px;border:1px solid var(--blue);border-radius:10px;padding:12px;font-size:14px;font-family:inherit;line-height:1.7;outline:none;resize:vertical;margin:12px 0}
.modal-btns{display:flex;gap:8px}
.mbtn{flex:1;border-radius:10px;padding:11px;font-size:14px;font-weight:700;cursor:pointer;border:1.5px solid var(--border);background:#fff;color:var(--sub)}
.mbtn.pri{background:var(--navy);color:#fff;border-color:var(--navy)}
/* progress */
.prog-wrap{padding:12px 14px;background:#f8fafc;border-top:1px solid var(--border)}
.prog-bar{height:7px;background:#e2e8f0;border-radius:4px;overflow:hidden;margin-top:5px}
.prog-fill{height:100%;border-radius:4px;transition:width .3s;background:linear-gradient(90deg,var(--green),#22c55e)}
.prog-lbl{display:flex;justify-content:space-between;font-size:12px;color:var(--sub)}
/* submit */
.submit-area{padding:14px 0 4px;display:flex;flex-direction:column;gap:8px}
.submit-btn{width:100%;background:var(--navy);color:#fff;border:none;border-radius:12px;padding:14px;font-size:15.5px;font-weight:800;cursor:pointer}
.submit-btn:hover{background:#142b45}
.print-btn{width:100%;background:#fff;color:var(--navy);border:1.5px solid var(--border);border-radius:12px;padding:12px;font-size:14px;font-weight:700;cursor:pointer}
.print-btn:hover{background:#f0f6ff}
.copy-done{background:#f0fdf4;border:1px solid #bbf7d0;color:#166534;border-radius:10px;padding:10px 14px;font-size:13px;font-weight:600;text-align:center;display:none}
/* manager */
.mgr-today{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:15px;margin:12px 0}
.mgr-pair{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.shift-card{border:1px solid var(--border);border-radius:10px;padding:11px;display:flex;flex-direction:column}
.shift-card .slbl{font-size:11.5px;font-weight:700;color:var(--sub);margin-bottom:4px}
.shift-card .srate{font-size:26px;font-weight:800;line-height:1}
.srate-bar{height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden;margin-top:7px}
.srate-fill{height:100%;border-radius:3px}
.smiss{font-size:12px;color:var(--red);margin-top:5px}
.sall{font-size:12px;color:var(--green);font-weight:700;margin-top:5px}
.scard-staff{font-size:11.5px;color:var(--sub);margin-top:7px;padding-top:7px;border-top:1px dashed var(--border)}
.approve-btn{margin-top:8px;width:100%;background:var(--blue);color:#fff;border:none;border-radius:9px;padding:9px;font-size:12.5px;font-weight:800;cursor:pointer}
.approve-btn:hover{background:#1d4ed8}
.approved-tag{margin-top:8px;background:#ecfdf5;border:1px solid #a7f3d0;color:#047857;border-radius:9px;padding:7px 9px;font-size:11.5px;font-weight:700;text-align:center;line-height:1.4}
/* calendar */
.cal-section{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin:12px 0}
.cal-title{font-size:13px;font-weight:800;color:var(--navy);margin-bottom:10px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.cal-cell{border-radius:8px;padding:6px 2px;text-align:center;cursor:pointer;border:2px solid transparent}
.cal-cell.sel{border-color:var(--navy)}
.cal-cell .dow{font-size:9.5px;color:var(--sub);font-weight:600;margin-bottom:3px}
.cal-cell .cbar{width:28px;height:12px;border-radius:3px;margin:0 auto 2px;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center}
.bg{background:#dcfce7;color:#166534}.ba{background:#fef3c7;color:#92400e}.br{background:#fee2e2;color:#991b1b}.be{background:#f1f5f9;color:#94a3b8}
.cal-cell .cdl{font-size:9.5px;color:var(--sub);margin-top:2px}
/* detail */
.det-panel{background:#f8fafc;border:1px solid var(--border);border-radius:12px;padding:14px;margin:0 0 12px}
.det-hd{font-size:12px;font-weight:700;color:var(--sub);margin-bottom:10px}
.det-meta{font-size:12px;color:var(--sub);margin:2px 0}
.det-approved{font-size:12px;font-weight:700;color:#047857;margin:3px 0 2px}
.det-cat{margin-bottom:8px}
.det-cn{font-size:12px;font-weight:700;color:var(--navy);margin:8px 0 4px}
.det-item{font-size:13px;display:flex;align-items:center;gap:5px;padding:1px 0}
.dok::before{content:"✓";color:var(--green);font-weight:700}
.dng::before{content:"✗";color:var(--red);font-weight:700}
.dng{color:var(--red);font-weight:600}
/* footer */
.footer-bar{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);padding:10px 16px calc(10px + var(--sb));display:flex;gap:8px;z-index:60}
.f-view{flex:2;display:flex;gap:6px}
.f-lang{flex:1;display:flex;gap:4px}
.view-btn,.f-lang button{flex:1;font-size:12.5px;font-weight:700;border:1.5px solid var(--border);border-radius:9px;padding:9px 4px;background:#fff;cursor:pointer;color:var(--sub)}
.view-btn.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.f-lang button.on{border-color:var(--navy);color:var(--navy);background:#f0f4ff}
@media print{
  header,.shift-tabs,.demo-note,.footer-bar,.submit-area,.item-acts,.reorder,.man-edit-btn,.modal-ov,.how-btn,.cam-btn,.temp-how{display:none!important}
  body{padding:0;background:#fff}
  .cat{border:1px solid #ccc;page-break-inside:avoid;border-radius:0}
  #view-manager,.co-banner{display:none!important}
  .edit-btn,.del-btn,.add-form{display:none!important}
}
</style>
</head>
<body>
<header><div class="wrap hd"><h1 id="hd-title">開店・閉店チェックリスト</h1><span class="badge">DEMO</span></div></header>
<div class="shift-tabs" id="shift-tabs">
  <button class="st on" id="st-open" onclick="setShift('open')"><span id="st-open-lbl">🌅 開店チェック</span></button>
  <button class="st" id="st-close" onclick="setShift('close')"><span id="st-close-lbl">🌙 閉店チェック</span></button>
</div>
<div class="wrap">
  <div class="demo-note" id="demo-note"></div>
  <div id="view-staff">
    <div id="co-banner"></div>
    <div id="checklist-body"></div>
    <div class="submit-area" id="submit-area"></div>
  </div>
  <div id="view-manager" style="display:none">
    <div class="mgr-today" id="mgr-today"></div>
    <div class="cal-section"><div class="cal-title" id="cal-title"></div><div class="cal-grid" id="cal-grid"></div></div>
    <div class="det-panel" id="det-panel" style="display:none"></div>
  </div>
</div>
<div class="footer-bar">
  <div class="f-view">
    <button class="view-btn on" id="fb-staff" onclick="switchView('staff')"><span id="fb-sl">📋 記録</span></button>
    <button class="view-btn" id="fb-mgr" onclick="switchView('manager')"><span id="fb-ml">👔 確認</span></button>
  </div>
  <div class="f-lang">
    <button class="on" onclick="setLang('ja')">日</button>
    <button onclick="setLang('en')">EN</button>
    <button onclick="setLang('zh')">中</button>
  </div>
</div>
<div class="modal-ov" id="manual-modal" style="display:none"><div class="modal-box" id="manual-box"></div></div>
<div class="modal-ov" id="course-modal" style="display:none"><div class="modal-box" id="course-box"></div></div>
<script>
// ── UI strings ────────────────────────────────────────────────
const UI={
ja:{title:'開店・閉店チェックリスト',shiftO:'🌅 開店チェック',shiftC:'🌙 閉店チェック',
  demo:'<b style="color:var(--navy)">サンプルデータのデモです。</b>架空の店舗「中華ダイニング 鳳来（デモ）」。',
  vStaff:'📋 記録',vMgr:'👔 確認',subO:'✅ 開店チェックを送信',subC:'✅ 閉店チェックを送信',
  print:'🖨 HACCP記録として印刷',copied:'報告を送信しました！管理者の確認待ちです（テキストもコピー済み）。',
  calT:'過去7日間の記録',today:'今日',miss:'未チェック',allOk:'全項目チェック済み ✓',
  norec:'記録なし',prog:'完了',rate:'完了率',editBtn:'✏ 編集',doneBtn:'✓ 完了',
  addItem:'＋ 項目追加',addPh:'項目名を入力',typeC:'チェック',typeQ:'数量あり',
  unitPh:'単位',hoRes:'明日の予約状況',hoMemo:'スタッフへの申し送り',hoMiss:'未完了・懸念事項',
  coTitle:'前日閉店からの引き継ぎ',coRes:'予約状況',coMemo:'申し送り',coMiss:'前日未完了',
  staffLbl:'担当者',staffPh:'記入者の名前を入力',
  howBtn:'やり方を見る',photoBtn:'写真で報告',photoRetake:'撮り直し',photoRemove:'取消',
  manTag:'やり方',manClose:'閉じる',manEdit:'✏ 手順を編集',manSave:'保存',manCancel:'キャンセル',
  manEmpty:'この項目の手順メモはまだありません。「手順を編集」から追加できます。',manPh:'手順・コツ・注意点を入力してください',

  const d=new Date(k+'T00:00:00'),m=d.getMonth()+1,dd=d.getDate();
  if(lang==='en'){const mn=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return mn[d.getMonth()]+' '+dd;}
  if(lang==='zh') return m+'月'+dd+'日';
  return m+'/'+dd;
}
function dow(k){
  const d=new Date(k+'T00:00:00'),w=d.getDay();
  if(lang==='en') return ['Su','Mo','Tu','We','Th','Fr','Sa'][w];
  if(lang==='zh') return ['日','一','二','三','四','五','六'][w];
  return ['日','月','火','水','木','金','土'][w];
}
function getRecord(s,k){const r=localStorage.getItem('cl-rec-'+s+'-'+k);return r?JSON.parse(r):null;}
function checkCats(s){return (s==='open'?CAT_OPEN:CAT_CLOSE).filter(c=>c!=='handover'&&c!=='reservation');}
function getRateData(s,k){
  const rec=getRecord(s,k); if(!rec) return null;
  const items=getItems(s);
  const allIds=[]; checkCats(s).forEach(c=>(items[c]||[]).forEach(i=>{if(i.t==='c'||i.t==='q') allIds.push(i.id);}));
  const total=allIds.length, done=allIds.filter(id=>rec.checked?.[id]).length;
  return {pct:total?Math.round(done/total*100):100, done, total, missing:allIds.filter(id=>!rec.checked?.[id])};
}

// ── Photo ──────────────────────────────────────────────────────
function takePhoto(id){
  const inp=document.createElement('input');
  inp.type='file'; inp.accept='image/*'; inp.capture='environment';
  inp.onchange=e=>{const f=e.target.files&&e.target.files[0]; if(f) handlePhoto(id,f);};
  inp.click();
}
function handlePhoto(id,file){
  const r=new FileReader();
  r.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const max=640; let w=img.width,h=img.height;
      if(w>h&&w>max){h=Math.round(h*max/w);w=max;} else if(h>=w&&h>max){w=Math.round(w*max/h);h=max;}
      const c=document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      photos[id]=c.toDataURL('image/jpeg',0.6);
      checked[id]=true; renderStaff();
    };
    img.src=e.target.result;
  };
  r.readAsDataURL(file);
}

// ── Edit mode ──────────────────────────────────────────────────
function toggleEdit(catKey){const k=shift+'-'+catKey;editModes[k]=!editModes[k];renderStaff();}
function moveItem(catKey,id,dir){
  const items=getItems(shift); const arr=items[catKey]; if(!arr) return;
  const i=arr.findIndex(x=>x.id===id); if(i<0) return;
  const j=i+dir; if(j<0||j>=arr.length) return;
  [arr[i],arr[j]]=[arr[j],arr[i]]; saveItems(shift,items); renderStaff();
}
function saveItemText(catKey,itemId,text){
  const items=getItems(shift); const item=items[catKey]?.find(i=>i.id===itemId);
  if(item){item.customText=text;saveItems(shift,items);}
}
function saveItemUnit(catKey,itemId,unit){
  const items=getItems(shift); const item=items[catKey]?.find(i=>i.id===itemId);
  if(item){item.unit=unit;saveItems(shift,items);}
}
function deleteItem(catKey,itemId){
  const items=getItems(shift);
  if(items[catKey]) items[catKey]=items[catKey].filter(i=>i.id!==itemId);
  saveItems(shift,items); delete checked[itemId]; delete photos[itemId]; renderStaff();
}
function addItem(catKey){
  const txt=document.getElementById('ai-'+catKey)?.value.trim();
  if(!txt) return;
  const type=document.getElementById('at-'+catKey)?.value||'c';
  const unit=document.getElementById('au-'+catKey)?.value.trim()||'g';
  const items=getItems(shift);
  if(!items[catKey]) items[catKey]=[];
  const id='cx-'+Date.now();
  const item={id,t:type,customText:txt}; if(type==='q') item.unit=unit;
  items[catKey].push(item); saveItems(shift,items); renderStaff();
}
function setQty(id,v,u2){
  if(!qtyVals[id]) qtyVals[id]={v:'',u:'g'};
  if(v!==null) qtyVals[id].v=v;
  if(u2!==null) qtyVals[id].u=u2;
}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ── Submit ─────────────────────────────────────────────────────
function doSubmit(){
  const phIds=Object.keys(photos);
  const rec={checked:{...checked},temps:{...tempVals},qtys:{...qtyVals},photos:{...photos},staff:staffName,submittedAt:new Date().toISOString(),approved:null};
  if(shift==='open') rec.resList=JSON.parse(JSON.stringify(resList));
  localStorage.setItem('cl-rec-'+shift+'-'+todayKey(),JSON.stringify(rec));
  // carry-over for closing
  if(shift==='close'){
    const co={reservations:hoVals.res,memo:hoVals.memo,concerns:hoVals.concerns,submittedAt:new Date().toISOString()};
    localStorage.setItem('cl-co-'+todayKey(),JSON.stringify(co));
  }
  // copy text
  let txt=`【${lang==='zh'?'中华餐厅 凤来（演示）':lang==='en'?'Hourai Demo':'中華ダイニング 鳳来（デモ）'}】\n`;
  txt+=`${shift==='open'?u().shiftO:u().shiftC} ${fmtDate(todayKey())} ${fmtTime(new Date().toISOString())}\n`;
  if(staffName) txt+=`${u().staffLbl}: ${staffName}\n`;
  txt+='\n';
  const cats=shift==='open'?CAT_OPEN:CAT_CLOSE;
  const items=getItems(shift);
  cats.forEach(c=>{
    if(c==='reservation'){
      if(!resList.length) return;
      txt+=`▌${u().cats.reservation}\n`;
      resList.forEach(r=>{txt+=`  ・${r.name||'-'} / ${r.people||'?'}${u().resPpl} / ${courseLabel(r)} / ${u().channels[r.chI]||''}\n`;});
      return;
    }
    if(c==='handover'){txt+=`\n▌${u().cats.handover}\n`;
      if(hoVals.res) txt+=`${u().hoRes}: ${hoVals.res}\n`;
      if(hoVals.memo) txt+=`${u().hoMemo}: ${hoVals.memo}\n`;
      if(hoVals.concerns) txt+=`${u().hoMiss}: ${hoVals.concerns}\n`;
      return;}
    txt+=`▌${u().cats[c]}\n`;
    (items[c]||[]).forEach(i=>{
      if(i.t==='t'){const v=tempVals[i.id]||'—'; txt+=`  📊 ${itxt(i)}: ${v}℃\n`;}
      else{const q=qtyVals[i.id]; const ph=photos[i.id]?' 📷':''; txt+=`  ${checked[i.id]?'✅':'❌'} ${itxt(i)}${q&&q.v?` (${q.v}${q.u})`:''}${ph}\n`;}
    });
  });
  navigator.clipboard.writeText(txt).catch(()=>{});
  const el=document.getElementById('copy-done');
  if(el){el.style.display='block';setTimeout(()=>{el.style.display='none';},4000);}
}

// ── Manager view ───────────────────────────────────────────────
function renderManager(){
  document.getElementById('cal-title').textContent=u().calT;
  const td=document.getElementById('mgr-today');
  const ro=getRateData('open',todayKey()), rc=getRateData('close',todayKey());
  td.innerHTML=`<div class="mgr-pair">${shiftCard(u().shiftO,ro,'open',todayKey())}${shiftCard(u().shiftC,rc,'close',todayKey())}</div>`;

  const grid=document.getElementById('cal-grid'); grid.innerHTML='';
  for(let i=6;i>=0;i--){
    const k=dateStr(i), ro2=getRateData('open',k), rc2=getRateData('close',k);
    const cell=document.createElement('div');
    cell.className='cal-cell'+(selDate===k?' sel':'');
    const lbl=i===0?u().today:fmtDate(k);
    cell.innerHTML=`<div class="dow">${dow(k)}</div><div class="cbar ${dotCls(ro2)}">${ro2?ro2.pct+'%':'—'}</div>
      <div class="cbar ${dotCls(rc2)}">${rc2?rc2.pct+'%':'—'}</div>
      <div class="cdl">${lbl}</div>`;
    cell.onclick=()=>{selDate=selDate===k?null:k;renderManager();};
    grid.appendChild(cell);
  }
  const dp=document.getElementById('det-panel');
  if(selDate){
    dp.style.display='block';
    const ro3=getRecord('open',selDate), rc3=getRecord('close',selDate);
    let html=`<div class="det-hd">${fmtDate(selDate)}</div>`;
    if(ro3||rc3){
      if(ro3) html+=recDetail('open',ro3,selDate);
      if(rc3) html+=recDetail('close',rc3,selDate);
    } else html+=`<div style="font-size:13px;color:var(--sub)">${u().norec}</div>`;
    dp.innerHTML=html;
  } else dp.style.display='none';
}
function shiftCard(label,rd,s,k){
  if(!rd) return `<div class="shift-card"><div class="slbl">${label}</div><div class="srate" style="color:var(--sub);font-size:15px">${u().norec}</div></div>`;
  const col=rd.pct===100?'var(--green)':rd.pct>=80?'var(--amber)':'var(--red)';
  const rec=getRecord(s,k);
  let extra='';
  if(rec&&rec.staff) extra+=`<div class="scard-staff">${u().byLbl}：${esc(rec.staff)}</div>`;
  if(rec){
    if(rec.approved) extra+=`<div class="approved-tag">✓ ${u().approvedLbl}<br>${esc(rec.approved.by)} ${fmtTime(rec.approved.at)}</div>`;
    else extra+=`<button class="approve-btn" onclick="approveRecord('${s}','${k}')">${u().approveBtn}</button>`;
  }
  return `<div class="shift-card"><div class="slbl">${label}</div><div class="srate" style="color:${col}">${rd.pct}%</div>
    <div class="srate-bar"><div class="srate-fill" style="width:${rd.pct}%;background:${col}"></div></div>
    ${rd.pct===100?`<div class="sall">${u().allOk}</div>`:`<div class="smiss">${u().miss}: ${rd.total-rd.done}</div>`}${extra}</div>`;
}
function approveRecord(s,k){
  const rec=getRecord(s,k); if(!rec) return;
  const by=lang==='zh'?'区域经理（演示）':lang==='en'?'Area Manager (Demo)':'エリアマネージャー（デモ）';
  rec.approved={by,at:new Date().toISOString()};
  localStorage.setItem('cl-rec-'+s+'-'+k,JSON.stringify(rec));
  renderManager();
}
function dotCls(rd){if(!rd) return 'be'; return rd.pct===100?'bg':rd.pct>=80?'ba':'br';}
function recDetail(s,rec,k){
  const items=getItems(s);
  const cats=s==='open'?CAT_OPEN:CAT_CLOSE;
  let html=`<div style="font-size:12px;font-weight:700;color:var(--navy);margin:10px 0 2px">${s==='open'?u().shiftO:u().shiftC}</div>`;
  if(rec.staff) html+=`<div class="det-meta">${u().byLbl}：${esc(rec.staff)}　${fmtTime(rec.submittedAt)}</div>`;
  if(rec.approved) html+=`<div class="det-approved">✓ ${u().approvedLbl}（${esc(rec.approved.by)} ${fmtTime(rec.approved.at)}）</div>`;
  cats.forEach(c=>{
    if(c==='handover'||c==='reservation') return;
    const ci=items[c]||[];
    if(!ci.length) return;
    html+=`<div class="det-cat"><div class="det-cn">${CAT_ICON[c]} ${u().cats[c]}</div><div class="det-items">`;
    ci.forEach(i=>{
      if(i.t==='t'){const v=rec.temps?.[i.id]||'—';html+=`<div class="det-item dok">${esc(itxt(i))}: ${v}℃</div>`;}
      else{const ok=!!rec.checked?.[i.id];const ph=rec.photos?.[i.id]?' 📷':'';html+=`<div class="det-item ${ok?'dok':'dng'}">${esc(itxt(i))}${ph}</div>`;}
    });
    html+='</div></div>';
  });
  if(s==='open'&&rec.resList&&rec.resList.length){
    html+=`<div class="det-cat"><div class="det-cn">${CAT_ICON.reservation} ${u().cats.reservation}</div>`;
    rec.resList.forEach(r=>{html+=`<div class="det-item dok">${esc(r.name||'-')} / ${esc(r.people||'?')}${u().resPpl} / ${esc(courseLabel(r))} / ${esc(u().channels[r.chI]||'')}</div>`;});
    html+='</div>';
  }
  return html;
}

// ── Switch ─────────────────────────────────────────────────────
function freshState(){
  editModes={};checked={};tempVals={};qtyVals={};photos={};
  hoVals={res:'',memo:'',concerns:''};staffName='';
  resList=shift==='open'?JSON.parse(JSON.stringify(DEFAULT_RESV)):[];
}
function setShift(s){shift=s;freshState();renderAll();}
function switchView(v){view=v;renderAll();}
function setLang(l){lang=l;localStorage.setItem('cl-lang',l);renderAll();}

// ── Demo seed ──────────────────────────────────────────────────
const STAFF_NAMES=['山田','佐藤','王','グエン','鈴木','チャン'];
function seedDemo(){
  ['open','close'].forEach(s=>{
    const items=getItems(s);
    const allIds=[],tids=[];
    checkCats(s).forEach(c=>(items[c]||[]).forEach(i=>{if(i.t==='c'||i.t==='q')allIds.push(i.id);else if(i.t==='t')tids.push(i.id);}));
    const endD=s==='open'?0:1; // open includes today (awaiting approval)
    for(let d=6;d>=endD;d--){
      const k=dateStr(d);
      if(localStorage.getItem('cl-rec-'+s+'-'+k)) continue;
      const rate=d===0?1:(0.85+Math.random()*0.15);
      const rec={checked:{},temps:{},qtys:{},photos:{},staff:STAFF_NAMES[Math.floor(Math.random()*STAFF_NAMES.length)],
        submittedAt:k+'T'+(s==='open'?'08':'22')+':'+(10+Math.floor(Math.random()*15)).toString().padStart(2,'0')+':00',approved:null};
      allIds.forEach(id=>rec.checked[id]=Math.random()<rate);
      if(d!==0&&rate<0.95){const got=allIds.filter(id=>rec.checked[id]).sort(()=>Math.random()-.5).slice(0,2);got.forEach(id=>rec.checked[id]=false);}
      else if(d===0) allIds.forEach(id=>rec.checked[id]=true);
      tids.forEach(id=>rec.temps[id]=s==='open'?String(3+Math.floor(Math.random()*3)):(id.indexOf('2')>=0?String(-18-Math.floor(Math.random()*4)):String(3+Math.floor(Math.random()*3))));
      if(s==='open') rec.resList=d===0?JSON.parse(JSON.stringify(DEFAULT_RESV)):[{name:STAFF_NAMES[d%STAFF_NAMES.length]+'様',people:String(2+d%5),type:d%2?'c':'a',chI:d%6}];
      if(d>=1) rec.approved={by:'エリアマネージャー（デモ）',at:k+'T'+(s==='open'?'09':'23')+':05:00'};
      localStorage.setItem('cl-rec-'+s+'-'+k,JSON.stringify(rec));
      if(s==='close'&&!localStorage.getItem('cl-co-'+k)){
        localStorage.setItem('cl-co-'+k,JSON.stringify({reservations:d===1?'明日12:00 4名 田中様、18:30 6名 鈴木会社様':'',memo:d===2?'冷凍庫のドアが閉まりにくい。翌朝要確認。':'',concerns:'',submittedAt:k+'T22:30:00'}));
      }
    }
  });
}

// ── Init ──────────────────────────────────────────────────────
freshState();
seedDemo();
renderAll();
</script>
