<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram分析ダッシュボード｜飲食店向けデモ</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root{--navy:#1c3a5e;--gold:#c9a84a;--ink:#1f2733;--sub:#64708020;--text:#1f2733;--muted:#6b7686;--bg:#f4f6f8;--card:#fff;--border:#e7ecf2;--green:#16a34a;--amber:#d97706;--red:#dc2626;--blue:#2563eb;--pink:#d62976;--purple:#962fbf;--sb:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",Meiryo,sans-serif;color:var(--text);background:var(--bg);line-height:1.6;-webkit-font-smoothing:antialiased;padding-bottom:calc(20px + var(--sb))}
.wrap{max-width:680px;margin:0 auto;padding:0 16px}
/* header */
header{background:linear-gradient(95deg,#feda75,#fa7e1e,#d62976,#962fbf,#4f5bd5);padding:14px 0;color:#fff;position:sticky;top:0;z-index:50}
.hd{display:flex;align-items:center;gap:11px}
.ava{width:40px;height:40px;border-radius:50%;background:#fff;flex:none;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 2px 8px rgba(0,0,0,.18)}
.hd .ht{flex:1;min-width:0}
.hd .ht h1{font-size:15px;font-weight:800;line-height:1.2}
.hd .ht p{font-size:11.5px;opacity:.92;font-weight:600}
.badge{font-size:10px;font-weight:800;background:rgba(255,255,255,.22);border:1px solid rgba(255,255,255,.5);color:#fff;padding:3px 9px;border-radius:20px;flex:none;backdrop-filter:blur(4px)}
/* tabs */
.tabs{display:flex;background:#fff;border-bottom:1px solid var(--border);position:sticky;top:68px;z-index:40}
.tab{flex:1;padding:11px 4px;font-size:13px;font-weight:700;border:none;background:none;cursor:pointer;color:var(--muted);border-bottom:3px solid transparent;margin-bottom:-1px}
.tab.on{color:var(--pink);border-bottom-color:var(--pink)}
.demo-note{background:var(--card);border-left:4px solid var(--purple);border-radius:10px;padding:10px 14px;margin:14px 0 0;font-size:12.5px;color:#3a4658}
.period{display:flex;gap:6px;margin:14px 0 0}
.period button{flex:1;font-size:12.5px;font-weight:700;border:1px solid var(--border);background:#fff;border-radius:9px;padding:8px 4px;cursor:pointer;color:var(--muted)}
.period button.on{background:var(--navy);color:#fff;border-color:var(--navy)}
/* section */
.sec{margin-top:16px}
.sec-h{display:flex;align-items:baseline;gap:8px;margin-bottom:9px}
.sec-h h2{font-size:14.5px;font-weight:800;color:var(--ink)}
.sec-h .hint{font-size:11px;color:var(--muted)}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:15px}
/* KPI */
.kpis{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:13px 14px}
.kpi .kl{font-size:11.5px;color:var(--muted);font-weight:700;display:flex;align-items:center;gap:5px}
.kpi .kv{font-size:25px;font-weight:800;line-height:1.15;margin-top:3px;letter-spacing:-.02em}
.kpi .kv small{font-size:13px;font-weight:700;color:var(--muted)}
.kpi .kd{font-size:11.5px;font-weight:700;margin-top:3px;display:flex;align-items:center;gap:3px}
.up{color:var(--green)}.down{color:var(--red)}.flat{color:var(--muted)}
.kpi .ks{font-size:10.5px;color:var(--muted);margin-top:2px}
/* chart */
.chart-box{position:relative;height:210px}
.chart-sm{position:relative;height:170px}
/* type table */
.ttab{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:12px}
.ttab th{text-align:right;font-size:10.5px;color:var(--muted);font-weight:700;padding:5px 6px;border-bottom:1px solid var(--border)}
.ttab th:first-child{text-align:left}
.ttab td{text-align:right;padding:8px 6px;border-bottom:1px solid #f1f4f8}
.ttab td:first-child{text-align:left;font-weight:700}
.ttab tr:last-child td{border-bottom:none}
.tdot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;vertical-align:middle}
.tbest{color:var(--green);font-weight:800}
/* heatmap */
.heat{overflow-x:auto;margin-top:4px}
.heat table{border-collapse:separate;border-spacing:3px;margin:0 auto}
.heat th{font-size:10px;color:var(--muted);font-weight:700;padding:2px;white-space:pre-line;line-height:1.15}
.heat td{width:42px;height:30px;border-radius:6px;text-align:center;font-size:10px;font-weight:700;color:#0f5132}
.heat .rl{font-size:11px;color:var(--ink);font-weight:800;width:auto;background:none!important;padding-right:4px}
.heat .pk{outline:2px solid var(--pink);outline-offset:-2px}
.heat-leg{display:flex;align-items:center;gap:6px;justify-content:flex-end;font-size:10.5px;color:var(--muted);margin-top:8px}
.heat-leg i{width:16px;height:11px;border-radius:3px;display:inline-block}
/* ranking */
.rank{display:flex;flex-direction:column;gap:9px}
.rk{display:flex;gap:11px;align-items:center;padding:10px;border:1px solid var(--border);border-radius:11px}
.rk .rn{font-size:16px;font-weight:800;color:var(--pink);width:24px;text-align:center;flex:none}
.rk .rthumb{width:46px;height:46px;border-radius:9px;flex:none;display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff}
.rk .ri{flex:1;min-width:0}
.rk .rcap{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rk .rmeta{font-size:11px;color:var(--muted);margin-top:1px}
.rk .rstat{text-align:right;flex:none}
.rk .rstat .v{font-size:16px;font-weight:800;color:var(--ink)}
.rk .rstat .l{font-size:10px;color:var(--muted)}
/* funnel */
.funnel{display:flex;flex-direction:column;gap:7px;margin-top:4px}
.fn{position:relative;border-radius:9px;color:#fff;padding:10px 13px;display:flex;justify-content:space-between;align-items:center}
.fn .fl{font-size:12.5px;font-weight:700}
.fn .fv{font-size:15px;font-weight:800}
.fn-conv{font-size:11px;color:var(--muted);text-align:center;margin:-2px 0}
/* insights */
.ins{display:flex;flex-direction:column;gap:9px}
.in{display:flex;gap:10px;padding:11px 13px;background:#fbfcfe;border:1px solid var(--border);border-left:3px solid var(--pink);border-radius:9px}
.in .ic{font-size:16px;flex:none}
.in .it{font-size:12.8px;line-height:1.55}
.in .it b{color:var(--pink)}
/* form */
.scan-btn{width:100%;background:linear-gradient(95deg,#fa7e1e,#d62976,#962fbf);color:#fff;border:none;border-radius:12px;padding:14px;font-size:14.5px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.scan-or{text-align:center;font-size:11.5px;color:var(--muted);margin:13px 0;position:relative}
.scan-or::before,.scan-or::after{content:"";position:absolute;top:50%;width:38%;height:1px;background:var(--border)}
.scan-or::before{left:0}.scan-or::after{right:0}
.scan-note{background:#f0fdf4;border:1px solid #bbf7d0;color:#166534;border-radius:10px;padding:10px 13px;font-size:12.5px;font-weight:600;margin-top:12px;display:none}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-top:6px}
.fld{display:flex;flex-direction:column;gap:4px}
.fld.full{grid-column:1/-1}
.fld label{font-size:11.5px;font-weight:700;color:var(--muted)}
.fld input,.fld select{border:1px solid var(--border);border-radius:9px;padding:9px 11px;font-size:14px;font-family:inherit;outline:none;background:#fff;width:100%}
.fld input:focus,.fld select:focus{border-color:var(--pink);box-shadow:0 0 0 3px rgba(214,41,118,.12)}
.type-pick{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.type-pick button{border:1.5px solid var(--border);background:#fff;border-radius:10px;padding:9px 2px;font-size:11.5px;font-weight:700;color:var(--muted);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px}
.type-pick button .tpi{font-size:17px}
.type-pick button.on{border-color:var(--pink);color:var(--pink);background:#fdf2f8}
.save-btn{width:100%;background:var(--navy);color:#fff;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:800;cursor:pointer;margin-top:16px}
.save-btn:hover{background:#142b45}
.cancel-link{display:block;text-align:center;font-size:12.5px;color:var(--muted);margin-top:10px;cursor:pointer}
/* list */
.lrow{display:flex;gap:11px;align-items:center;padding:11px;border:1px solid var(--border);border-radius:11px;margin-bottom:9px;background:#fff}
.lrow .lthumb{width:42px;height:42px;border-radius:9px;flex:none;display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff}
.lrow .li{flex:1;min-width:0}
.lrow .lcap{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lrow .lmeta{font-size:11px;color:var(--muted)}
.lrow .lacts{display:flex;gap:4px;flex:none}
.lrow .lacts button{border:1px solid var(--border);background:#fff;border-radius:8px;padding:6px 9px;font-size:12px;cursor:pointer;color:var(--muted)}
.lrow .lacts .del:hover{color:var(--red);border-color:#fecaca}
.tag{font-size:10px;font-weight:700;padding:1px 7px;border-radius:20px;color:#fff;display:inline-block;vertical-align:middle}
.empty{text-align:center;color:var(--muted);font-size:13px;padding:30px 10px}
.legend-note{font-size:11px;color:var(--muted);margin-top:10px;line-height:1.5}
/* account overview */
.acct{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;background:var(--border);border-radius:14px;overflow:hidden;border:1px solid var(--border)}
.acct .ac{background:#fff;padding:12px 14px}
.acct .ac .l{font-size:11px;color:var(--muted);font-weight:700;display:flex;align-items:center;gap:4px}
.acct .ac .v{font-size:21px;font-weight:800;margin-top:2px;letter-spacing:-.02em}
.acct .ac .s{font-size:10.5px;color:var(--muted);margin-top:1px}
/* audience */
.aud-grp+.aud-grp{margin-top:15px;padding-top:14px;border-top:1px solid var(--border)}
.aud-h{font-size:12.5px;font-weight:800;color:var(--ink);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.aud-h .tagn{font-size:10px;font-weight:700;color:var(--purple);background:#f6ecfb;border-radius:20px;padding:2px 8px}
.bar-row{display:grid;grid-template-columns:62px 1fr 44px;align-items:center;gap:9px;margin-bottom:7px}
.bar-row .bl{font-size:11.5px;color:var(--muted);font-weight:600;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{height:9px;background:#eef1f5;border-radius:5px;overflow:hidden}
.bar-fill{height:100%;border-radius:5px}
.bar-val{font-size:11.5px;font-weight:800;text-align:right;color:var(--ink)}
.aud-upd{font-size:10.5px;color:var(--muted);margin-top:12px;text-align:right}
/* scan types */
.scan-types{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.scan-types button{border:1.5px solid var(--border);background:#fff;border-radius:12px;padding:13px 4px;font-size:12px;font-weight:700;color:var(--ink);cursor:pointer;line-height:1.35}
.scan-types button small{display:block;font-size:9.5px;color:var(--muted);font-weight:600;margin-top:2px}
.scan-types button:active{background:#fdf2f8;border-color:var(--pink)}
@media(max-width:430px){.kpi .kv{font-size:22px}.scan-types button{font-size:11px}}
/* goal input */
.goal-form{display:flex;flex-direction:column;gap:11px;margin-top:14px}
.gfld{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;display:grid;grid-template-columns:1fr auto;align-items:center;gap:4px 12px}
.gfld .gfl{font-size:14px;font-weight:700}
.gfld .ginput{display:flex;align-items:center;gap:7px}
.gfld .ginput .gt{font-size:12px;color:var(--muted);font-weight:700}
.gfld .ginput input{width:96px;border:1px solid var(--border);border-radius:9px;padding:8px 10px;font-size:15px;text-align:right;font-family:inherit;outline:none}
.gfld .ginput input:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(150,47,191,.12)}
.gfld .ginput .gu{font-size:12px;color:var(--muted);width:18px}
.gfld .gcur{grid-column:1/-1;font-size:11.5px;color:var(--muted)}
.goal-save{width:100%;background:linear-gradient(95deg,#d62976,#962fbf);color:#fff;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:800;cursor:pointer;margin-top:16px}
.goal-done{display:none;background:#f0fdf4;border:1px solid #bbf7d0;color:#166534;border-radius:10px;padding:11px 14px;font-size:13px;font-weight:600;text-align:center;margin-top:12px}
/* goal gap card */
.gap-card{display:flex;flex-direction:column;gap:14px}
.gfld.gdl{border-color:var(--accent-line,#eccfc9);background:#fbf3f1}
.gfld.gdl .ginput input{width:auto;text-align:left}
.gap-dl{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:#7a3a12;background:#fff6ec;border:1px solid #f3d9b8;border-radius:10px;padding:9px 13px}
.gap-dl b{color:var(--pink)}
.gap-dl.over{color:#991b1b;background:#fee2e2;border-color:#fecaca}
.gap-dl.over b{color:#991b1b}
.gap-row{display:grid;grid-template-columns:128px 1fr;gap:5px 12px;align-items:center}
.gap-lbl{font-size:13px;font-weight:700}
.gap-bar{height:9px;background:#eef1f5;border-radius:5px;overflow:hidden}
.gap-fill{height:100%;border-radius:5px;transition:width .4s}
.gap-num{grid-column:1/-1;display:flex;justify-content:space-between;align-items:baseline;font-size:11.5px;color:var(--muted);gap:10px}
.gap-num b{font-size:15px;font-family:var(--mono,inherit)}
.qa-wrap{border-top:1px solid var(--border);padding-top:13px}
.qa-h{font-size:12.5px;font-weight:800;margin-bottom:9px}
.qa{font-size:12.8px;color:#4a4f57;background:#faf6fd;border:1px solid #eadcf5;border-left:3px solid var(--purple);border-radius:9px;padding:9px 12px;margin-bottom:7px;line-height:1.6}
.qa b{color:var(--ink)}
.qa.met{background:#f0fdf4;border-color:#bbf7d0;border-left-color:var(--green);color:#166534;font-weight:700}
</style>
</head>
<body>
<header><div class="wrap hd">
  <div class="ava">🥟</div>
  <div class="ht"><h1>中華ダイニング 鳳来（デモ）</h1><p>@hourai_dining ・ フォロワー <span id="hd-fol">—</span></p></div>
  <span class="badge">DEMO</span>
</div></header>
<div class="tabs">
  <button class="tab on" id="tab-dash" onclick="setView('dash')">📊 分析</button>
  <button class="tab" id="tab-goal" onclick="setView('goal')">🎯 目標</button>
  <button class="tab" id="tab-add" onclick="setView('add')">＋ 投稿を追加</button>
  <button class="tab" id="tab-list" onclick="setView('list')">📋 投稿一覧</button>
</div>
<div class="wrap">
  <div id="view-dash"></div>
  <div id="view-goal" style="display:none"></div>
  <div id="view-add" style="display:none"></div>
  <div id="view-list" style="display:none"></div>
</div>
<script>
// ── constants ─────────────────────────────────────────────────
const TYPES={
  reel:{label:'リール',icon:'🎬',color:'#d62976'},
  carousel:{label:'カルーセル',icon:'🖼',color:'#962fbf'},
  image:{label:'単一画像',icon:'📷',color:'#fa7e1e'},
  story:{label:'ストーリー',icon:'⚡',color:'#4f5bd5'},
};
const DOW=['日','月','火','水','木','金','土'];
const BUCKETS=[
  {k:'m',label:'朝\n7-11',lo:7,hi:11},
  {k:'l',label:'昼\n11-14',lo:11,hi:14},
  {k:'a',label:'午後\n14-17',lo:14,hi:17},
  {k:'e',label:'夕\n17-19',lo:17,hi:19},
  {k:'n',label:'夜\n19-22',lo:19,hi:22},
  {k:'z',label:'深夜\n22-7',lo:22,hi:31},
];
function bucketIdx(h){if(h<7)h+=24;for(let i=0;i<BUCKETS.length;i++){if(h>=BUCKETS[i].lo&&h<BUCKETS[i].hi)return i;}return 5;}
const ACT_COLS=[0,3,6,9,12,15,18,21]; // 3時間バケット（IGの「アクティブな時間」に合わせる）

// ── state ─────────────────────────────────────────────────────
let view='dash', period=30, editId=null, formType='reel';
let charts={};

// ── storage ───────────────────────────────────────────────────
function getPosts(){const r=localStorage.getItem('ig-posts');return r?JSON.parse(r):[];}
function savePosts(p){localStorage.setItem('ig-posts',JSON.stringify(p));}
function getFollowers(){const r=localStorage.getItem('ig-followers');return r?JSON.parse(r):[];}
function saveFollowers(f){localStorage.setItem('ig-followers',JSON.stringify(f));}
function getAudience(){const r=localStorage.getItem('ig-audience');return r?JSON.parse(r):null;}
function saveAudience(a){localStorage.setItem('ig-audience',JSON.stringify(a));}
function getAccount(){const r=localStorage.getItem('ig-account');return r?JSON.parse(r):null;}
function saveAccount(a){localStorage.setItem('ig-account',JSON.stringify(a));}

// ── helpers ───────────────────────────────────────────────────
function dkey(n){const d=new Date();d.setDate(d.getDate()-n);return d.toISOString().slice(0,10);}
function daysAgo(k){return Math.round((Date.now()-new Date(k+'T00:00:00').getTime())/864e5);}
function fmtN(n){n=Math.round(n);return n>=10000?(n/10000).toFixed(n>=100000?0:1)+'万':n.toLocaleString('ja-JP');}
function fmtFull(n){return Math.round(n).toLocaleString('ja-JP');}
function pct(n,d){return d?n/d*100:0;}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function eng(p){return (p.likes+p.comments+p.saves+p.shares);}
function erRate(p){return pct(eng(p),p.reach);}
function saveRate(p){return pct(p.saves,p.reach);}
function discRate(p){return pct(p.reachNF,p.reach);}
function fmtDate(k){const d=new Date(k+'T00:00:00');return (d.getMonth()+1)+'/'+d.getDate();}
function inPeriod(p,days){return days===0?true:daysAgo(p.date)<days;}

// ── view switch ───────────────────────────────────────────────
function setView(v){
  view=v;
  document.getElementById('tab-dash').classList.toggle('on',v==='dash');
  document.getElementById('tab-goal').classList.toggle('on',v==='goal');
  document.getElementById('tab-add').classList.toggle('on',v==='add');
  document.getElementById('tab-list').classList.toggle('on',v==='list');
  document.getElementById('view-dash').style.display=v==='dash'?'':'none';
  document.getElementById('view-goal').style.display=v==='goal'?'':'none';
  document.getElementById('view-add').style.display=v==='add'?'':'none';
  document.getElementById('view-list').style.display=v==='list'?'':'none';
  if(v==='dash')renderDash();else if(v==='goal')renderGoal();else if(v==='add')renderAdd();else renderList();
  window.scrollTo(0,0);
}
// ── 目標(ノルマ) ───────────────────────────────────────────────
function getGoals(){const r=localStorage.getItem('ig-goals');return r?JSON.parse(r):null;}
function saveGoals(g){localStorage.setItem('ig-goals',JSON.stringify(g));}
function defaultDeadline(){const d=new Date();const e=new Date(d.getFullYear(),d.getMonth()+1,0);const p=n=>String(n).padStart(2,'0');return e.getFullYear()+'-'+p(e.getMonth()+1)+'-'+p(e.getDate());}
function fmtJDate(ymd){try{return new Date(ymd+'T00:00:00').toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric'});}catch(e){return ymd;}}
function daysUntil(ymd){return Math.ceil((new Date(ymd+'T23:59:59')-Date.now())/864e5);}
const GOAL_METRICS=[
  {k:'follow',label:'👥 フォロワー純増',unit:'人',get:m=>m.follow,tip:'プロフィール・固定投稿を見直し、発見リーチ施策で新規フォローを増やす。'},
  {k:'er',label:'❤️ 平均エンゲージ率',unit:'%',get:m=>m.er,tip:'冒頭・サムネを改善し、保存・コメントしたくなる情報設計に。'},
  {k:'save',label:'🔖 平均保存率',unit:'%',get:m=>m.save,tip:'メニューや限定情報はカルーセルで（あとで見たい＝保存されやすい）。'},
  {k:'disc',label:'🧭 発見リーチ比率',unit:'%',get:m=>m.disc,tip:'リールを増やして非フォロワー（新規）に届ける。'},
  {k:'clicks',label:'🔗 予約クリック',unit:'件',get:m=>m.clicks,tip:'プロフィールのリンク導線・ストーリーズで予約を訴求する。'},

function computeMetrics(){
  const fol=getFollowers(), posts=getPosts();
  const cur=posts.filter(p=>inPeriod(p,period));
  const avg=(a,fn)=>a.length?a.reduce((s,p)=>s+fn(p),0)/a.length:0;
  const folNow=fol.length?fol[fol.length-1].count:0;
  return {follow:folNow-findFol(fol,period||60),er:avg(cur,erRate),save:avg(cur,saveRate),disc:avg(cur,discRate),clicks:cur.reduce((s,p)=>s+(p.linkClicks||0),0)};
}
function fmtMetric(def,v){return def.unit==='%'?(+v).toFixed(1)+'%':fmtFull(Math.round(v))+def.unit;}
function renderGoal(){

function saveGoalsFromForm(){

function goalSub(key,cur){
  const g=getGoals(); if(!g||g[key]==null||g[key]<=0) return '';
  const def=GOAL_METRICS.find(d=>d.k===key); const rate=cur/g[key]*100;
  const col=rate>=100?'var(--green)':rate>=80?'var(--amber)':'var(--red)';
  return ` <span style="color:${col};font-weight:700">／ 目標 ${fmtMetric(def,g[key])}・達成 ${Math.round(rate)}%</span>`;
}
function goalGapHTML(){
  const g=getGoals(); if(!g) return '';

    const t=g[d.k], c=d.get(m), rate=t?c/t*100:0; if(rate>=100)met++;

    const diff=c-t, dt=(diff>=0?'+':'')+(d.unit==='%'?diff.toFixed(1)+'pt':fmtFull(Math.round(diff))+d.unit);
    return `<div class="gap-row"><div class="gap-lbl">${d.label}</div>

  }).join('');
  const behind=defs.filter(d=>d.get(m)/g[d.k]<1).sort((a,b)=>a.get(m)/g[a.k]-b.get(m)/g[b.k]).slice(0,3);

    ? `<div class="qa-h">📌 達成への近道（未達の優先${behind.length}項目）</div>`+behind.map(d=>`<div class="qa"><b>${d.label}：</b>${d.tip}</div>`).join('')

}

function findFol(fol,n){const t=dkey(n);let best=fol[0]?fol[0].count:0;for(const f of fol){if(f.date<=t)best=f.count;else break;}return best;}
function kpi(label,val,c,p,unit,sub){
  let delta='',cls='flat',arrow='→';
  if(p!==undefined&&p!==null){
    const diff=c-p;
    if(Math.abs(diff)<0.05){cls='flat';arrow='→';delta='前期間と同水準';}

    else{cls='down';arrow='▼';delta='前期間比 '+(unit==='%'?diff.toFixed(1):fmtFull(diff))+(unit==='%'?'pt':'');}
  }
  return `<div class="kpi"><div class="kl">${label}</div>

function typeAgg(posts){

    const ps=posts.filter(p=>p.type===k);
    out[k]={n:ps.length,reach:ps.length?ps.reduce((s,p)=>s+p.reach,0)/ps.length:0,
      er:ps.length?ps.reduce((s,p)=>s+erRate(p),0)/ps.length:0,
      save:ps.length?ps.reduce((s,p)=>s+saveRate(p),0)/ps.length:0,
      disc:ps.length?ps.reduce((s,p)=>s+discRate(p),0)/ps.length:0};
  }
  return out;
}
function drawType(posts){

function drawTypeTable(posts){

function drawFunnel(posts){
  const sum=(fn)=>posts.reduce((s,p)=>s+fn(p),0);
  const disc=sum(p=>p.reachNF), visits=sum(p=>p.profileVisits), follows=sum(p=>p.follows), clicks=sum(p=>p.linkClicks);
  const stages=[
    {l:'発見リーチ（新規に到達）',v:disc,c:'#962fbf'},
    {l:'プロフィール訪問',v:visits,c:'#d62976'},
    {l:'予約リンク クリック',v:clicks,c:'#fa7e1e'},
    {l:'新規フォロー',v:follows,c:'#16a34a'},
  ];
  const max=Math.max(disc,1);
  let html='';
  stages.forEach((s,i)=>{
    const w=Math.max(18,s.v/max*100);
    html+=`<div class="fn" style="background:${s.c};width:${w}%;min-width:62%"><span class="fl">${s.l}</span><span class="fv">${fmtFull(s.v)}</span></div>`;

    if(i===1)html+=`<div class="fn-conv">クリック率 ${pct(clicks,visits).toFixed(1)}% ／ フォロー率 ${pct(follows,visits).toFixed(1)}% ↓</div>`;
  });

function drawInsights(posts){
  const agg=typeAgg(posts);
  const keys=Object.keys(TYPES).filter(k=>agg[k].n>0);
  const ins=[];
  // best save type
  let bs=keys.slice().sort((a,b)=>agg[b].save-agg[a].save)[0];
  if(bs)ins.push({ic:'🔖',t:`保存率が最も高いのは <b>${TYPES[bs].label}</b>（${agg[bs].save.toFixed(1)}%）。保存は「あとで行きたい」のサイン。メニューや限定情報は${TYPES[bs].label}で発信すると来店リスト入りしやすいです。`});
  // best discovery type
  let bd=keys.slice().sort((a,b)=>agg[b].disc-agg[a].disc)[0];
  if(bd)ins.push({ic:'🧭',t:`新規認知（発見リーチ）は <b>${TYPES[bd].label}</b> が牽引（非フォロワー ${agg[bd].disc.toFixed(0)}%）。フォロワー外に届けたい週は${TYPES[bd].label}を増やしましょう。`});
  // best active time (audience)
  const aud=getAudience();
  if(aud){
    let bd=0,bb=0,bv=0;for(let d=0;d<7;d++)for(let b=0;b<8;b++){if(aud.active[d][b]>bv){bv=aud.active[d][b];bd=d;bb=b;}}
    ins.push({ic:'⏰',t:`フォロワーが最も活発なのは <b>${DOW[bd]}曜 ${ACT_COLS[bb]}時台</b>。投稿はこの少し前に出すと初速がつきます。`});
    // local reach (restaurant relevance)
    const localSum=aud.locations.reduce((s,x)=>s+x.p,0);
    ins.push({ic:'📍',t:`フォロワーの上位地域は <b>${aud.locations.slice(0,3).map(x=>x.n).join('・')}</b>（上位5地域で約${localSum.toFixed(0)}%）。来店圏内の人に届いており、投稿が予約・来店に直結しやすい状態です。`});
    // age fit
    const topAge=aud.age.slice().sort((a,b)=>b.p-a.p)[0];
    ins.push({ic:'🎂',t:`フォロワーの中心は <b>${topAge.r}歳（${topAge.p}%）</b>。この年代に響く価格帯・メニュー写真・文章を意識すると反応が伸びます。`});
  }
  // top post
  const tp=posts.slice().sort((a,b)=>b.saves-a.saves)[0];
  if(tp)ins.push({ic:'🏆',t:`直近の主役は「<b>${esc(tp.caption)}</b>」。保存${fmtFull(tp.saves)}・リーチ${fmtN(tp.reach)}。同じ切り口の投稿を続けて伸びを確かめましょう。`});
  document.getElementById('insights').innerHTML=ins.map(i=>`<div class="in"><span class="ic">${i.ic}</span><span class="it">${i.t}</span></div>`).join('');
}

// ── add / edit ────────────────────────────────────────────────
function renderAdd(){
  const p=editId?getPosts().find(x=>x.id===editId):null;
  if(p)formType=p.type; else if(!editId)formType='reel';
  const root=document.getElementById('view-add');
  const g=(v)=>v==null?'':v;
  root.innerHTML=`
  <div class="demo-note">${editId?'投稿を<b style="color:var(--purple)">編集</b>します。':'<b style="color:var(--purple)">スクショから読み取り</b>、または手入力で投稿の数値を登録します。'}</div>
  ${editId?'':`<div class="sec">
    <div class="aud-h" style="margin-bottom:9px">📸 スクショから読み取る <span class="tagn">AIが自動抽出・デモ</span></div>
    <div class="scan-types">
      <button onclick="simScanType('post')">📊 投稿インサイト<small>リーチ/保存/反応</small></button>
      <button onclick="simScanType('account')">📈 アカウント概要<small>閲覧数/インタラクション</small></button>
      <button onclick="simScanType('audience')">👥 オーディエンス<small>性別/年齢/地域</small></button>
    </div>
    <input type="file" id="scan-file" accept="image/*" style="display:none">
    <div class="scan-note" id="scan-note"></div>
    <div class="scan-or">投稿は下のフォームから手入力もできます</div>
  </div>`}
  <div class="sec">
    <div class="fld full"><label>投稿タイプ</label>
      <div class="type-pick" id="type-pick">${Object.keys(TYPES).map(k=>`<button data-t="${k}" class="${formType===k?'on':''}" onclick="pickType('${k}')"><span class="tpi">${TYPES[k].icon}</span>${TYPES[k].label}</button>`).join('')}</div></div>
    <div class="fgrid">
      <div class="fld full"><label>キャプション / メモ</label><input id="f-cap" value="${esc(g(p&&p.caption))}" placeholder="例：新作 麻婆豆腐フェア"></div>
      <div class="fld"><label>投稿日</label><input id="f-date" type="date" value="${g(p&&p.date)||dkey(0)}"></div>
      <div class="fld"><label>投稿時刻</label><input id="f-time" type="time" value="${p?String(p.hour).padStart(2,'0')+':00':'19:00'}"></div>
      <div class="fld"><label>リーチ数</label><input id="f-reach" type="number" inputmode="numeric" value="${g(p&&p.reach)}" placeholder="0"></div>
      <div class="fld"><label>うち非フォロワー（発見）</label><input id="f-nf" type="number" inputmode="numeric" value="${g(p&&p.reachNF)}" placeholder="0"></div>
      <div class="fld"><label>いいね</label><input id="f-likes" type="number" inputmode="numeric" value="${g(p&&p.likes)}" placeholder="0"></div>
      <div class="fld"><label>コメント</label><input id="f-comments" type="number" inputmode="numeric" value="${g(p&&p.comments)}" placeholder="0"></div>
      <div class="fld"><label>保存</label><input id="f-saves" type="number" inputmode="numeric" value="${g(p&&p.saves)}" placeholder="0"></div>
      <div class="fld"><label>シェア</label><input id="f-shares" type="number" inputmode="numeric" value="${g(p&&p.shares)}" placeholder="0"></div>
      <div class="fld"><label>プロフィール訪問</label><input id="f-pv" type="number" inputmode="numeric" value="${g(p&&p.profileVisits)}" placeholder="0"></div>
      <div class="fld"><label>予約リンク クリック</label><input id="f-lc" type="number" inputmode="numeric" value="${g(p&&p.linkClicks)}" placeholder="0"></div>
      <div class="fld"><label>この投稿経由のフォロー</label><input id="f-follows" type="number" inputmode="numeric" value="${g(p&&p.follows)}" placeholder="0"></div>
    </div>
    <button class="save-btn" onclick="savePost()">${editId?'更新する':'投稿を登録する'}</button>
    ${editId?'<span class="cancel-link" onclick="cancelEdit()">キャンセル</span>':''}
  </div>`;
}
function pickType(k){formType=k;document.querySelectorAll('#type-pick button').forEach(b=>b.classList.toggle('on',b.dataset.t===k));}
function simScanType(t){
  const fi=document.getElementById('scan-file');
  fi.value='';
  fi.onchange=()=>{
    const note=document.getElementById('scan-note');
    if(t==='post'){
      fillScan(note);
      note.innerHTML='✅ <b>投稿インサイト</b>から数値を抽出しました（デモ）。内容を確認して保存してください。';
    } else if(t==='account'){
      seedAccount(true);
      note.innerHTML='✅ <b>アカウント概要</b>（閲覧数・インタラクション）を読み取り、ダッシュボードに反映しました（デモ）。';
      note.style.display='block'; note.scrollIntoView({behavior:'smooth',block:'center'});
      setTimeout(()=>setView('dash'),1200);
    } else {
      seedAudience(true);
      note.innerHTML='✅ <b>オーディエンス</b>（性別・年齢・地域・アクティブ時間）を読み取り、ダッシュボードに反映しました（デモ）。';
      note.style.display='block'; note.scrollIntoView({behavior:'smooth',block:'center'});
      setTimeout(()=>setView('dash'),1200);
    }
  };
  fi.click();
}
function fillScan(note){
  // demo: generate a plausible reel insight
  const reach=2600+Math.floor(Math.random()*5000);
  const nf=Math.round(reach*(0.6+Math.random()*0.2));
  const er=0.04+Math.random()*0.03;
  const total=Math.round(reach*er);
  const saves=Math.round(total*(0.2+Math.random()*0.15));
  const comments=Math.round(total*(0.06+Math.random()*0.05));
  const shares=Math.round(total*(0.08+Math.random()*0.06));
  const likes=Math.max(0,total-saves-comments-shares);
  const pv=Math.round(nf*(0.05+Math.random()*0.04));
  pickType('reel');
  setVal('f-cap','（スクショから取込）週末限定コースのご案内');
  setVal('f-date',dkey(0));setVal('f-time','19:00');
  setVal('f-reach',reach);setVal('f-nf',nf);setVal('f-likes',likes);setVal('f-comments',comments);
  setVal('f-saves',saves);setVal('f-shares',shares);setVal('f-pv',pv);
  setVal('f-lc',Math.round(pv*0.25));setVal('f-follows',Math.round(pv*0.18));
  note.style.display='block';note.scrollIntoView({behavior:'smooth',block:'center'});
}
function setVal(id,v){const el=document.getElementById(id);if(el)el.value=v;}
function gv(id){return +document.getElementById(id).value||0;}
function savePost(){
  const reach=gv('f-reach');
  if(reach<=0){alert('リーチ数を入力してください。');return;}
  const time=document.getElementById('f-time').value||'19:00';
  const post={
    id:editId||('p'+Date.now()),
    caption:document.getElementById('f-cap').value.trim()||'（無題の投稿）',
    date:document.getElementById('f-date').value||dkey(0),
    hour:parseInt(time.split(':')[0])||19,
    type:formType,reach,reachNF:Math.min(gv('f-nf'),reach),
    likes:gv('f-likes'),comments:gv('f-comments'),saves:gv('f-saves'),shares:gv('f-shares'),
    profileVisits:gv('f-pv'),linkClicks:gv('f-lc'),follows:gv('f-follows'),
  };
  let posts=getPosts();
  if(editId)posts=posts.map(p=>p.id===editId?post:p); else posts.push(post);
  savePosts(posts);
  // bump follower series end if new follows on latest date
  editId=null;
  setView('dash');
}
function cancelEdit(){editId=null;setView('list');}

// ── list ──────────────────────────────────────────────────────
function renderList(){
  const posts=getPosts().slice().sort((a,b)=>a.date<b.date?1:-1);
  const root=document.getElementById('view-list');
  if(!posts.length){root.innerHTML='<div class="empty">投稿がありません。</div>';return;}
  root.innerHTML='<div class="demo-note">登録済みの投稿。タップで編集、🗑で削除できます。</div><div class="sec">'+
    posts.map(p=>`<div class="lrow">
      <div class="lthumb" style="background:${TYPES[p.type].color}">${TYPES[p.type].icon}</div>
      <div class="li" onclick="editPost('${p.id}')">
        <div class="lcap">${esc(p.caption)}</div>
        <div class="lmeta">${fmtDate(p.date)} ・ <span class="tag" style="background:${TYPES[p.type].color}">${TYPES[p.type].label}</span> ・ リーチ ${fmtN(p.reach)} ・ 保存 ${fmtFull(p.saves)}</div>
      </div>
      <div class="lacts"><button onclick="editPost('${p.id}')">✏️</button><button class="del" onclick="delPost('${p.id}')">🗑</button></div>
    </div>`).join('')+'</div>';
}
function editPost(id){editId=id;setView('add');}
function delPost(id){if(!confirm('この投稿を削除しますか？'))return;savePosts(getPosts().filter(p=>p.id!==id));renderList();}

// ── seed demo data ────────────────────────────────────────────
function seedDemo(){
  if(getPosts().length)return;
  const CAPS={
    reel:['名物 小籠包の湯気','麻婆豆腐できたて','厨房ライブ：炎の中華鍋','週末限定コース紹介','北京ダックの切り分け','エビチリ実演'],
    carousel:['新メニュー5品まとめ','個室・宴会のご案内','飲み放題プラン一覧','ランチ全6種','季節の前菜盛り合わせ'],
    image:['本日の日替わり','店内の雰囲気','看板メニュー杏仁豆腐','テラス席のご案内','スタッフ集合写真'],
    story:['本日空席あり','タイムセール告知','予約受付中','明日のおすすめ'],
  };
  const posts=[];
  const N=44;
  for(let i=0;i<N;i++){
    const day=1+Math.floor(i*(88/N))+Math.floor(Math.random()*2); // spread over ~90 days
    const r=Math.random();
    let type=r<0.42?'reel':r<0.72?'carousel':r<0.9?'image':'story';
    const caps=CAPS[type];
    const cap=caps[Math.floor(Math.random()*caps.length)];
    let reach,disc,er,saveR;
    if(type==='reel'){reach=2400+Math.floor(Math.random()*6500);disc=.6+Math.random()*.22;er=.04+Math.random()*.035;saveR=.018+Math.random()*.03;}
    else if(type==='carousel'){reach=1200+Math.floor(Math.random()*2400);disc=.25+Math.random()*.22;er=.05+Math.random()*.04;saveR=.03+Math.random()*.035;}
    else if(type==='image'){reach=850+Math.floor(Math.random()*1500);disc=.12+Math.random()*.18;er=.03+Math.random()*.025;saveR=.008+Math.random()*.02;}
    else{reach=700+Math.floor(Math.random()*1200);disc=.05+Math.random()*.12;er=.02+Math.random()*.02;saveR=.002+Math.random()*.008;}
    const total=Math.round(reach*er);
    const saves=Math.round(reach*saveR);
    const comments=Math.round(total*(0.05+Math.random()*0.05));
    const shares=Math.round(total*(0.06+Math.random()*0.07));
    const likes=Math.max(0,total-saves-comments-shares);
    const reachNF=Math.round(reach*disc);
    const pv=Math.round(reachNF*(0.05+Math.random()*0.05)+reach*0.01);
    const hourPool=type==='reel'?[11,12,17,18,19,20,21]:type==='carousel'?[11,12,13,18,19,20]:type==='image'?[10,11,12,15,18,19]:[11,12,16,17,20,21];
    const hour=hourPool[Math.floor(Math.random()*hourPool.length)];
    // weekend boost
    const dateObj=new Date();dateObj.setDate(dateObj.getDate()-day);
    const wd=dateObj.getDay();
    const wkBoost=(wd===5||wd===6)?1.18:1;
    posts.push({id:'seed'+i,caption:cap,date:dateObj.toISOString().slice(0,10),hour,type,
      reach:Math.round(reach*wkBoost),reachNF:Math.round(reachNF*wkBoost),
      likes,comments,saves:Math.round(saves*wkBoost),shares,
      profileVisits:pv,linkClicks:Math.round(pv*(0.15+Math.random()*0.2)),follows:Math.round(pv*(0.12+Math.random()*0.15))});
  }
  savePosts(posts);
  // followers series ~90 days, rising with noise
  const fol=[];let c=3760;
  for(let d=90;d>=0;d--){
    const dateObj=new Date();dateObj.setDate(dateObj.getDate()-d);
    const key=dateObj.toISOString().slice(0,10);
    // base daily gain + boosts on post days with follows
    const dayPosts=posts.filter(p=>p.date===key);
    const gain=4+Math.floor(Math.random()*7)+dayPosts.reduce((s,p)=>s+p.follows,0)*0.55;
    c+=gain-Math.floor(Math.random()*3);
    fol.push({date:key,count:Math.round(c)});
  }
  saveFollowers(fol);
  seedAudience(false);
  seedAccount(false);
  // サンプル目標（未設定時のみ）— 初見で「目標vs実績」が見えるように
  if(!getGoals()) saveGoals({follow:500,er:6.0,save:4.0,disc:50,clicks:650,deadline:defaultDeadline()});
}
function seedAudience(force){
  if(!force&&getAudience())return;
  const j=force?(0.92+Math.random()*0.16):1; // 取り込みごとに微変動
  const r=(v)=>Math.round(v*j*10)/10;
  const active={};
  // 時間帯の活性カーブ（IGの「アクティブな時間」想定）: 深夜低・昼そこそこ・夕〜夜ピーク
  const curve=[26,15,30,55,60,62,90,84]; // 0,3,6,9,12,15,18,21時
  for(let d=0;d<7;d++){
    const wk=(d===5||d===6)?1.12:(d===0?1.05:1);
    active[d]=curve.map(v=>Math.max(4,Math.round(v*wk*(0.9+Math.random()*0.2))));
  }
  const fol=getFollowers();
  const aud={
    updated:dkey(0),
    followers:fol.length?fol[fol.length-1].count:4900,
    gender:{m:r(56.9),f:r(43.1)},
    age:[{r:'13-17',p:r(0)},{r:'18-24',p:r(2.4)},{r:'25-34',p:r(9.1)},{r:'35-44',p:r(13.3)},{r:'45-54',p:r(26.5)},{r:'55-64',p:r(28.3)},{r:'65+',p:r(20.4)}],
    locations:[{n:'東京 港区',p:r(7.1)},{n:'横浜市',p:r(5.0)},{n:'東京 中央区',p:r(5.0)},{n:'東京 世田谷区',p:r(4.4)},{n:'東京 品川区',p:r(3.2)}],
    active,
    growth:{gained:Math.round(38*j),lost:Math.round(14*j)},
  };
  saveAudience(aud);
}
function seedAccount(force){
  if(!force&&getAccount())return;
  const posts=getPosts().filter(p=>daysAgo(p.date)<30);
  const sum=fn=>posts.reduce((s,p)=>s+fn(p),0);
  const reach=sum(p=>p.reach);
  const j=force?(0.94+Math.random()*0.12):1;
  saveAccount({
    updated:dkey(0),periodDays:30,
    reach:Math.round(reach*j),
    views:Math.round(reach*1.34*j),
    interactions:Math.round(sum(p=>eng(p))*j),
    profileVisits:Math.round(sum(p=>p.profileVisits)*j),
    linkClicks:Math.round(sum(p=>p.linkClicks)*j),
  });
}

// ── init ──────────────────────────────────────────────────────
seedDemo();
renderDash();
</script>
