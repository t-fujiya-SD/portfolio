<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ブログ・コラム｜飲食店経営のヒント — 株式会社スパイシーデバイス</title>
<meta name="description" content="飲食店の数字・業務改善・DX・仕入れ・原価・集客のヒントを発信。代表が現場目線で書くコラムをnoteで更新中です。">
<link rel="canonical" href="https://spicy-device.com/blog/">
<link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png"><link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16.png"><link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
<meta property="og:type" content="website">
<meta property="og:site_name" content="株式会社スパイシーデバイス">
<meta property="og:title" content="ブログ・コラム｜飲食店経営のヒント">
<meta property="og:description" content="飲食店の数字・業務改善・DXのヒントを現場目線で発信。">
<meta property="og:url" content="https://spicy-device.com/blog/">
<meta property="og:image" content="https://spicy-device.com/assets/og-image.png">
<meta property="og:locale" content="ja_JP">
<meta name="twitter:card" content="summary_large_image">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Noto+Sans+JP:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<script defer src="../assets/site-config.js"></script>
<script defer src="../assets/analytics.js"></script>
<style>
:root{--ink:#2f3133;--ink2:#5b6066;--muted:#8a9099;--line:#e8eaed;--bg:#fff;--soft:#f7f8fa;--accent:#C32F1C;--accent-d:#9E2415;--accent-soft:#fbeeec;--accent-line:#eccfc9;--mono:"Chakra Petch",sans-serif;--sans:"Noto Sans JP",-apple-system,BlinkMacSystemFont,"Hiragino Sans",Meiryo,sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--sans);color:var(--ink);background:var(--bg);line-height:1.8;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
.wrap{max-width:1000px;margin:0 auto;padding:0 22px}
header{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.86);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.hd{display:flex;align-items:center;justify-content:space-between;height:60px}
.logo-img{height:23px;width:auto;display:block}
.back{font-size:13px;font-weight:700;color:var(--ink2)}
.back:hover{color:var(--accent)}
main{padding:48px 0 72px}
.seclabel{font-family:var(--mono);font-size:12px;font-weight:600;letter-spacing:.14em;color:var(--accent);margin-bottom:8px}
h1{font-size:27px;font-weight:900;letter-spacing:-.02em;margin-bottom:8px}
.sub{font-size:13.5px;color:var(--ink2);margin-bottom:14px}
.note-link{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:700;color:#fff;background:#41C9B4;border-radius:9px;padding:9px 16px;margin-bottom:30px;transition:transform .15s,box-shadow .15s}
.note-link:hover{transform:translateY(-1px);box-shadow:0 8px 18px rgba(65,201,180,.32)}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
.card{display:flex;flex-direction:column;border:1px solid var(--line);border-radius:14px;overflow:hidden;background:#fff;transition:transform .16s,box-shadow .16s}
.card:hover{transform:translateY(-4px);box-shadow:0 18px 40px rgba(40,44,50,.1)}
.thumb{aspect-ratio:16/9;background:var(--soft) center/cover no-repeat;border-bottom:1px solid var(--line)}
.cbody{padding:15px 16px 17px;display:flex;flex-direction:column;flex:1}
.cdate{font-family:var(--mono);font-size:11.5px;color:var(--muted);margin-bottom:6px}
.ctitle{font-size:14.5px;font-weight:700;line-height:1.55;color:var(--ink);flex:1}
.cmore{margin-top:12px;font-size:12.5px;font-weight:700;color:var(--accent)}
.empty{color:var(--muted);font-size:14px;padding:30px 0;text-align:center}
.foot-cta{margin-top:40px;text-align:center}
.foot-cta a{display:inline-flex;align-items:center;gap:7px;font-size:14px;font-weight:700;border:1.5px solid var(--line);border-radius:10px;padding:12px 22px;color:var(--ink2)}
.foot-cta a:hover{border-color:var(--accent);color:var(--accent)}
footer{background:#23262a;color:#a7adb4;font-size:12px;padding:22px 0;text-align:center;margin-top:8px}
@media(max-width:820px){.grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:520px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <div class="wrap hd">
    <a href="../" aria-label="SPICY DEVICE"><img src="../assets/logo.png" alt="SPICY DEVICE" class="logo-img"></a>
    <a class="back" href="../">← トップへ戻る</a>
  </div>
</header>
<main>
  <div class="wrap">
    <div class="seclabel">BLOG</div>
    <h1>ブログ・コラム</h1>
    <p class="sub">飲食店の数字・業務改善・仕入れ・原価・集客のヒントを、現場目線で発信しています。</p>
    <a class="note-link" href="https://note.com/spicy_device" target="_blank" rel="noopener">📝 noteで読む・フォローする →</a>
    <div class="grid" id="blogList"><p class="empty">記事を読み込み中…</p></div>
    <div class="foot-cta"><a href="https://note.com/spicy_device" target="_blank" rel="noopener">noteで記事をもっと見る →</a></div>
  </div>
</main>
<footer>© 2026 株式会社スパイシーデバイス</footer>
<script>
fetch('../assets/blog.json?cb='+Date.now()).then(r=>r.json()).then(items=>{
  const box=document.getElementById('blogList');
  if(!Array.isArray(items)||!items.length){box.innerHTML='<p class="empty">記事は準備中です。<a href="https://note.com/spicy_device" target="_blank" rel="noopener" style="color:var(--accent);font-weight:700">noteを見る →</a></p>';return;}
  box.innerHTML=items.map(n=>`<a class="card" href="${n.url}" target="_blank" rel="noopener">
    <div class="thumb"${n.thumb?` style="background-image:url('${n.thumb}')"`:''}></div>
    <div class="cbody"><div class="cdate">${n.date||''}</div><div class="ctitle">${n.title||''}</div><div class="cmore">noteで読む →</div></div>
  </a>`).join('');
}).catch(()=>{document.getElementById('blogList').innerHTML='<p class="empty">記事を読み込めませんでした。<a href="https://note.com/spicy_device" target="_blank" rel="noopener" style="color:var(--accent);font-weight:700">noteを見る →</a></p>';});
</script>
</body>
</html>
